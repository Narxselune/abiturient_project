<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная страница — Система мониторинга</title>
    <link rel="stylesheet" href="css/main.css">

    <!-- Моментальное определение темы до отрисовки для предотвращения вспышек -->
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>

    <!-- Стили загрузки фонов, прописанные напрямую в файле (защита от CORS-блокировок file://) -->
    <style>
        .body-main {
            background-image: url('Fon/litht.jpeg') !important; /* Светлая тема с расширением .jpeg */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.3s ease;
        }

        /* При включенной темной теме картинка плавно сменяется на темную */
        .dark-mode .body-main {
            background-image: url('Fon/dark.jpeg') !important; /* Тёмная тема с расширением .jpeg */
        }
    </style>

    <!-- Библиотеки React, ReactDOM и компилятор Babel для работы компонентов -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
</head>
<body class="body-main">
    <!-- Переключатель темы (в правом верхнем углу экрана) -->
    <a href="javascript:void(0)" class="btn-theme" onclick="toggleTheme()" title="Переключить тему">
        <svg id="theme-icon" viewBox="0 0 24 24">
            <!-- Иконка луны по умолчанию -->
            <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />
        </svg>
    </a>

    <div class="container container-main">
        <header class="header-main">
            <h1 class="title-main">ИНФОРМАЦИЯ<br>для абитуриентов</h1>
        </header>

        <!-- Контейнер монтирования React-компонента Главного меню, Истории и Кабинета -->
        <main id="react-homepage-root">
            <div style="text-align: center; padding: 20px; color: #666; font-style: italic;">
                Загрузка данных...
            </div>
        </main>
    </div>

    <!-- Виджет чат-ассистента на Vanilla JS -->
    <div id="ai-assistant" class="ai-widget">
        <button id="ai-toggle-btn" class="ai-toggle-btn" onclick="toggleAssistant()" title="Помощник абитуриента">
            <span class="ai-btn-text">Задать вопрос</span>
        </button>

        <!-- Окно чата -->
        <div id="ai-window" class="ai-window" style="display: none;">
            <div class="ai-header">
                <div class="ai-bot-info">
                    <div class="ai-bot-avatar">🤖</div>
                    <div>
                        <div class="ai-bot-name">Ассистент приемной комиссии</div>
                        <div class="ai-bot-status">Онлайн | Псевдо-ИИ</div>
                    </div>
                </div>
                <button class="ai-close-btn" onclick="toggleAssistant()">&times;</button>
            </div>

            <div id="ai-messages" class="ai-messages">
                <div class="ai-message bot">
                    Привет! Я твой интерактивный помощник. Могу подсказать информацию о поступлении в 2026 году. Выбери готовый вопрос или напиши свой ниже!
                </div>
            </div>

            <!-- Быстрые вопросы-кнопки (скрыты по умолчанию на мобильных, показываются при фокусе) -->
            <div id="ai-quick-questions" class="ai-quick-questions">
                <button onclick="sendQuickQuestion('Какие документы нужны?')">📄 Какие документы нужны?</button>
                <button onclick="sendQuickQuestion('Когда заканчивается прием?')">📅 Сроки подачи документов</button>
                <button onclick="sendQuickQuestion('Какая стоимость обучения?')">💰 Стоимость обучения</button>
                <button onclick="sendQuickQuestion('Как работает калькулятор?')">📊 Как работает калькулятор?</button>
            </div>

            <div class="ai-input-container">
                <input type="text" id="ai-user-input" placeholder="Введите ваш вопрос..."
                       onkeydown="handleAssistantKey(event)"
                       onfocus="showQuickQuestions()"
                       onblur="hideQuickQuestions()">
                <button id="ai-send-btn" onclick="sendMessageFromInput()">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- React-компонент Главного меню, Истории и Личного кабинета -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================================================
        // КОМПОНЕНТ ЛИЧНОГО КАБИНЕТА С ЧЕК-ЛИСТОМ И РАСШИРЕННЫМ ТЕСТОМ
        // ==========================================================================
        function PersonalCabinet({ isOpen, onClose }) {
            const [activeTab, setActiveTab] = useState('checklist');

            // Состояние фильтров документов
            const [level, setLevel] = useState(() => localStorage.getItem('chk_level') || 'sso');
            const [isMinor, setIsMinor] = useState(() => localStorage.getItem('chk_is_minor') || 'no');
            const [form, setForm] = useState(() => localStorage.getItem('chk_form') || 'dnev');

            // Состояние отмеченных документов
            const [checkedItems, setCheckedItems] = useState(() => {
                const saved = localStorage.getItem('chk_checked_items');
                return saved ? JSON.parse(saved) : {};
            });

            // Шаги теста-навигатора
            const [quizStep, setQuizStep] = useState(1);
            const [targetLevel, setTargetLevel] = useState('');     // sso, vo
            const [targetBase, setTargetBase] = useState('');       // 9, 11, sso_short
            const [targetInterests, setTargetInterests] = useState(''); // code, hardware, manage
            const [specificChoice, setSpecificChoice] = useState('');   // Конечный уточняющий выбор

            useEffect(() => {
                localStorage.setItem('chk_level', level);
                localStorage.setItem('chk_is_minor', isMinor);
                localStorage.setItem('chk_form', form);
            }, [level, isMinor, form]);

            useEffect(() => {
                localStorage.setItem('chk_checked_items', JSON.stringify(checkedItems));
            }, [checkedItems]);

            if (!isOpen) return null;

            const handleCheckboxChange = (id) => {
                setCheckedItems(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const resetQuiz = () => {
                setQuizStep(1);
                setTargetLevel('');
                setTargetBase('');
                setTargetInterests('');
                setSpecificChoice('');
            };

            const getRequiredDocuments = () => {
                const docs = [
                    { id: 'photos', text: '6 цветных фотографий размером 3х4 см' },
                    { id: 'passport', text: 'Паспорт или ID-карта абитуриента (оригинал + копии страниц 31-33)' },
                    { id: 'edu_docs', text: 'Оригиналы документов об образовании с приложениями (аттестат / свидетельство)' },
                    { id: 'medical', text: 'Медицинская справка (форма 1 здр/у-10) с точным указанием специальностей' }
                ];
                if (level === 'vo') {
                    docs.push({ id: 'ce_ct', text: 'Оригиналы и копии сертификатов ЦЭ и ЦТ' });
                    docs.push({ id: 'school_char', text: 'Характеристика с места учебы (для выпускников этого года)' });
                }
                if (form === 'zaoch') {
                    docs.push({ id: 'work_book', text: 'Выписка (копия) из трудовой книжки, заверенная печатью' });
                }
                if (isMinor === 'yes') {
                    docs.push({ id: 'parent_presence', text: 'Присутствие законного представителя (родителя) с его паспортом' });
                }
                return docs;
            };

            // Алгоритм жесткого подбора ровно 1 специальности
            const calculateRecommendation = () => {
                if (targetLevel === 'sso') {
                    // --- СРЕДНЕЕ СПЕЦИАЛЬНОЕ ОБРАЗОВАНИЕ ---
                    if (targetBase === '9') {
                        if (targetInterests === 'code') {
                            return specificChoice === 'web' ? {
                                name: "Разработка и сопровождение веб-ресурсов",
                                desc: "Ты будешь проектировать, программировать веб-сайты и верстать современные интерфейсы на JS/HTML.",
                                url: "pages/monitoring/mon_sso_9_spec1.html"
                            } : {
                                name: "Тестирование программного обеспечения",
                                desc: "Ты освоишь контроль качества ПО, автоматизацию тестов и работу в QA-команде.",
                                url: "pages/monitoring/mon_sso_9_spec7.html"
                            };
                        } else if (targetInterests === 'hardware') {
                            if (specificChoice === 'cable') {
                                return {
                                    name: "Информационные кабельные сети",
                                    desc: "Монтаж, обслуживание высокоскоростных оптических линий и локальных вычислительных сетей связи.",
                                    url: "pages/monitoring/mon_sso_9_spec3.html"
                                };
                            } else if (specificChoice === 'tv') {
                                return {
                                    name: "Техническая эксплуатация систем радиосвязи, вещания и телевидения",
                                    desc: "Обслуживание передающих станций связи, цифрового ТВ-оборудования и радиовещательных сетей.",
                                    url: "pages/monitoring/mon_sso_9_spec4.html"
                                };
                            } else if (specificChoice === 'multi') {
                                return {
                                    name: "Техническая эксплуатация мультимедийных систем",
                                    desc: "Настройка сложных звуковых и видео-систем, акустического концертного и студийного оборудования.",
                                    url: "pages/monitoring/mon_sso_9_spec5.html"
                                };
                            } else {
                                return {
                                    name: "Техническая эксплуатация систем и сетей телекоммуникаций",
                                    desc: "Комплексное инфокоммуникационное администрирование, телефония, системное и сетевое администрирование.",
                                    url: "pages/monitoring/mon_sso_9_spec2.html"
                                };
                            }
                        } else {
                            return {
                                name: "Почтовая деятельность (9 кл.)",
                                desc: "Логистическое управление, учет почтового трафика и стабильная работа с быстрой траекторией карьеры.",
                                url: "pages/monitoring/mon_sso_9_spec6.html"
                            };
                        }
                    } else { // 11 класс ССО
                        if (targetInterests === 'code') {
                            return {
                                name: "Тестирование программного обеспечения (11 кл., Дневное)",
                                desc: "ИТ-курс (2 года) для быстрого старта в QA-инженерии.",
                                url: "pages/monitoring/mon_sso_11_dnev_spec4.html"
                            };
                        } else if (targetInterests === 'hardware') {
                            return specificChoice === 'dnev' ? {
                                name: "Телекоммуникации (Дневное)",
                                desc: "Очное обучение администрированию современных сотовых, спутниковых и проводных сетей связи.",
                                url: "pages/monitoring/mon_sso_11_dnev_spec1.html"
                            } : {
                                name: "Телекоммуникации (Заочное)",
                                desc: "Заочное обучение современным телекоммуникационным системам с возможностью совмещать с работой.",
                                url: "pages/monitoring/mon_sso_11_zaoch_spec5.html"
                            };
                        } else {
                            return specificChoice === 'dnev' ? {
                                name: "Почтовая деятельность (Дневное)",
                                desc: "Очное обучение логистике, автоматизации отправлений и управлению клиентским сервисом.",
                                url: "pages/monitoring/mon_sso_11_dnev_spec3.html"
                            } : {
                                name: "Почтовая деятельность (Заочное)",
                                desc: "Заочный курс логистики для работающих в логистических центрах или почтовой службе.",
                                url: "pages/monitoring/mon_sso_11_zaoch_spec7.html"
                            };
                        }
                    }
                } else { // --- ВЫСШЕЕ ОБРАЗОВАНИЕ ---
                    if (targetBase === '11') {
                        if (targetInterests === 'code') {
                            return {
                                name: "Прикладная информатика (ВО)",
                                desc: "Глубокая математическая и программная подготовка для разработчиков и инженеров ИТ-сферы.",
                                url: "pages/monitoring/mon_vo_11_spec3.html"
                            };
                        } else if (targetInterests === 'hardware') {
                            return specificChoice === 'auto' ? {
                                name: "Автоматизация технологических процессов и производств",
                                desc: "Программирование микроконтроллеров, робототехника, системы умных заводов и ПЛК.",
                                url: "pages/monitoring/mon_vo_11_spec1.html"
                            } : {
                                name: "Системы и сети инфокоммуникаций (11 кл.)",
                                desc: "Проектирование и эксплуатация магистралей связи, беспроводных систем передачи информации.",
                                url: "pages/monitoring/mon_vo_11_spec2.html"
                            };
                        } else {
                            return specificChoice === 'market' ? {
                                name: "Маркетинг (ВО)",
                                desc: "Анализ рынка услуг связи, управление лояльностью клиентов, продвижение брендов и продуктовая аналитика.",
                                url: "pages/monitoring/mon_vo_11_spec5.html"
                            } : {
                                name: "Цифровые клиентские сервисы и почтово-логистические системы",
                                desc: "ИТ-логистика, интеграция баз данных, управление почтовыми хабами и сервисами доставок.",
                                url: "pages/monitoring/mon_vo_11_spec4.html"
                            };
                        }
                    } else { // ВО после ССО (Сокращенная форма)
                        if (targetInterests === 'code') {
                            return {
                                name: "Прикладная информатика (Дневное сокращенное)",
                                desc: "Продолжение твоей ИТ-траектории в уплотненном формате (2,5 года) для выпускников колледжей.",
                                url: "pages/monitoring/mon_vo_sso_dnev_spec2.html"
                            };
                        } else if (targetInterests === 'hardware') {
                            return specificChoice === 'dnev' ? {
                                name: "Системы и сети инфокоммуникаций (Дневное сокращенное)",
                                desc: "Ускоренное инженерное высшее образование в области построения инфокоммуникаций (2.5 года).",
                                url: "pages/monitoring/mon_vo_sso_dnev_spec1.html"
                            } : {
                                name: "Системы и сети инфокоммуникаций (Заочное сокращенное)",
                                desc: "Заочный инженерный курс (3 года) для выпускников колледжей.",
                                url: "pages/monitoring/mon_vo_sso_zaoch_spec4.html"
                            };
                        } else {
                            return specificChoice === 'dnev' ? {
                                name: "Почтовая связь (Дневное сокращенное)",
                                desc: "Почтово-логистические системы, управление транспортными хабами и узлами связи (3 года).",
                                url: "pages/monitoring/mon_vo_sso_dnev_spec3.html"
                            } : {
                                name: "Почтовая связь (Заочное сокращенное)",
                                desc: "Высшее образование для логистов и связистов в заочной сокращенной форме (3,5 года).",
                                url: "pages/monitoring/mon_vo_sso_zaoch_spec6.html"
                            };
                        }
                    }
                }
            };

            return (
                <div className="cabinet-window">
                    <div className="cabinet-header">
                        <div className="cabinet-header-title">
                            👤 Личный кабинет абитуриента
                        </div>
                        <button className="ai-close-btn" onClick={onClose}>&times;</button>
                    </div>

                    <div className="cabinet-tabs">
                        <button
                            className={`cabinet-tab-btn ${activeTab === 'checklist' ? 'active' : ''}`}
                            onClick={() => setActiveTab('checklist')}
                        >
                            📋 Чек-лист
                        </button>
                        <button
                            className={`cabinet-tab-btn ${activeTab === 'quiz' ? 'active' : ''}`}
                            onClick={() => setActiveTab('quiz')}
                        >
                            🧭 Выбор специальности
                        </button>
                    </div>

                    <div className="cabinet-body">
                        {activeTab === 'checklist' && (
                            <div>
                                <div className="cab-checklist-filters">
                                    <div className="cab-filter-row">
                                        <label>Куда поступаю:</label>
                                        <select className="cab-select" value={level} onChange={(e) => setLevel(e.target.value)}>
                                            <option value="sso">В колледж (ССО)</option>
                                            <option value="vo">В университет (ВО)</option>
                                        </select>
                                    </div>
                                    <div className="cab-filter-row">
                                        <label>Форма обучения:</label>
                                        <select className="cab-select" value={form} onChange={(e) => setForm(e.target.value)}>
                                            <option value="dnev">Дневная</option>
                                            <option value="zaoch">Заочная</option>
                                        </select>
                                    </div>
                                    <div className="cab-filter-row">
                                        <label>Мне меньше 18 лет:</label>
                                        <select className="cab-select" value={isMinor} onChange={(e) => setIsMinor(e.target.value)}>
                                            <option value="no">Нет</option>
                                            <option value="yes">Да</option>
                                        </select>
                                    </div>
                                </div>

                                <div style={{ display: 'flex', flexDirection: 'column' }}>
                                    {getRequiredDocuments().map((doc) => {
                                        const isChecked = !!checkedItems[doc.id];
                                        return (
                                            <label key={doc.id} className={`cab-checklist-item ${isChecked ? 'completed' : ''}`}>
                                                <input
                                                    type="checkbox"
                                                    checked={isChecked}
                                                    onChange={() => handleCheckboxChange(doc.id)}
                                                />
                                                <span>{doc.text}</span>
                                            </label>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'quiz' && (
                            <div>
                                {quizStep === 1 && (
                                    <div>
                                        <p className="cab-quiz-question">1. Какой уровень образования тебя интересует?</p>
                                        <div className="cab-quiz-options">
                                            <button className="cab-quiz-btn" onClick={() => { setTargetLevel('sso'); setQuizStep(2); }}>🎓 Среднее специальное (Колледж)</button>
                                            <button className="cab-quiz-btn" onClick={() => { setTargetLevel('vo'); setQuizStep(2); }}>🏫 Высшее образование (ВО)</button>
                                        </div>
                                    </div>
                                )}

                                {quizStep === 2 && (
                                    <div>
                                        <p className="cab-quiz-question">2. Какая база образования у тебя на момент поступления?</p>
                                        <div className="cab-quiz-options">
                                            {targetLevel === 'sso' ? (
                                                <React.Fragment>
                                                    <button className="cab-quiz-btn" onClick={() => { setTargetBase('9'); setQuizStep(3); }}>• На базе 9 классов</button>
                                                    <button className="cab-quiz-btn" onClick={() => { setTargetBase('11'); setQuizStep(3); }}>• На базе 11 классов / ПТО</button>
                                                </React.Fragment>
                                            ) : (
                                                <React.Fragment>
                                                    <button className="cab-quiz-btn" onClick={() => { setTargetBase('11'); setQuizStep(3); }}>• На базе 11 классов</button>
                                                    <button className="cab-quiz-btn" onClick={() => { setTargetBase('sso_short'); setQuizStep(3); }}>• После колледжа (сокращенно)</button>
                                                </React.Fragment>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {quizStep === 3 && (
                                    <div>
                                        <p className="cab-quiz-question">3. Выбери наиболее близкую тебе сферу деятельности:</p>
                                        <div className="cab-quiz-options">
                                            <button className="cab-quiz-btn" onClick={() => { setTargetInterests('code');
                                                // Проверяем условное ветвление, чтобы не задавать лишних вопросов
                                                if (targetLevel === 'sso' && targetBase === '11') { setQuizStep(5); } // Сразу результат (только 1 ИТ спец)
                                                else if (targetLevel === 'vo' && targetBase === '11') { setQuizStep(5); } // Сразу результат
                                                else if (targetLevel === 'vo' && targetBase === 'sso_short') { setQuizStep(5); } // Сразу результат
                                                else { setQuizStep(4); }
                                            }}>💻 Программирование и ИТ (написание кода, тестирование)</button>

                                            <button className="cab-quiz-btn" onClick={() => { setTargetInterests('hardware'); setQuizStep(4); }}>🔌 Системы, радиоэлектроника и сетевое оборудование</button>

                                            <button className="cab-quiz-btn" onClick={() => { setTargetInterests('manage');
                                                if (targetLevel === 'sso' && targetBase === '9') { setQuizStep(5); } // Сразу результат
                                                else { setQuizStep(4); }
                                            }}>📦 Почтово-логистические системы, маркетинг и управление</button>
                                        </div>
                                    </div>
                                )}

                                {quizStep === 4 && (
                                    <div>

                                                    <button className="cab-quiz-btn" onClick={() => { setSpecificChoice('telecom'); setQuizStep(5); }}>🖥️ Настройка АТС и глобальное сетевое администрирование</button>

                                            {targetLevel === 'sso' && targetBase === '11' && targetInterests === 'hardware' && (
                                                <React.Fragment>
                                                    <button className="cab-quiz-btn" onClick={() => { setSpecificChoice('dnev'); setQuizStep(5); }}>☀️ Дневная форма обучения (2 года 10 месяцев)</button>

                                                </React.Fragment>

                                            {/* ССО + 11 кл + Почта */}
                                            {targetLevel === 'sso' && targetBase === '11' && targetInterests === 'manage' && (

                                                    <button className="cab-quiz-btn" onClick={() => { setSpecificChoice('dnev'); setQuizStep(5); }}>☀️ Дневная форма обучения (2 года)</button>
                                                    <button className="cab-quiz-btn" onClick={() => { setSpecificChoice('zaoch'); setQuizStep(5); }}>🌙 Заочная форма обучения (2 года)</button>
                                                </React.Fragment>
                                            )}

                                            {/* ВО + 11 кл + Железо */}
                                            {targetLevel === 'vo' && targetBase === '11' && targetInterests === 'hardware' && (
                                                <React.Fragment>
                                                    <button className="cab-quiz-btn" onClick={() => { setSpecificChoice('auto'); setQuizStep(5); }}>🤖 Автоматика, программирование ПЛК и промышленных роботов</button>
                                                    <button className="cab-quiz-btn" onClick={() => { setSpecificChoice('network'); setQuizStep(5); }}>🌐 Проектирование сетей связи и инфокоммуникаций</button>
                                                </React.Fragment>
                                            )}

                                            {/* ВО + 11 кл + Маркетинг/Почта */}
                                            {targetLevel === 'vo' && targetBase === '11' && targetInterests === 'manage' && (
                                                <React.Fragment>
                                                    <button className="cab-quiz-btn" onClick={() => { setSpecificChoice('market'); setQuizStep(5); }}>📈 Маркетинговый анализ рынка, реклама и PR</button>
                                                    <button className="cab-quiz-btn" onClick={() => { setSpecificChoice('post'); setQuizStep(5); }}>📦 Цифровая почтовая логистика и клиентские сервисы</button>
                                                </React.Fragment>
                                            )}

                                            {/* ВО + ССО + Железо */}
                                            {targetLevel === 'vo' && targetBase === 'sso_short' && targetInterests === 'hardware' && (
                                                <React.Fragment>
                                                    <button className="cab-quiz-btn" onClick={() => { setSpecificChoice('dnev'); setQuizStep(5); }}>☀️ Дневное сокращенное отделение (2,5 года)</button>
                                                    <button className="cab-quiz-btn" onClick={() => { setSpecificChoice('zaoch'); setQuizStep(5); }}>🌙 Заочное сокращенное отделение (3 года)</button>
                                                </React.Fragment>
                                            )}

                                            {/* ВО + ССО + Почта */}
                                            {targetLevel === 'vo' && targetBase === 'sso_short' && targetInterests === 'manage' && (
                                                <React.Fragment>
                                                    <button className="cab-quiz-btn" onClick={() => { setSpecificChoice('dnev'); setQuizStep(5); }}>☀️ Дневное сокращенное отделение (3 года)</button>
                                                    <button className="cab-quiz-btn" onClick={() => { setSpecificChoice('zaoch'); setQuizStep(5); }}>🌙 Заочное сокращенное отделение (3,5 года)</button>
                                                </React.Fragment>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {quizStep === 5 && (
                                    <div className="quiz-result-box">
                                        <p style={{ fontWeight: 'bold', color: '#007bff', fontSize: '15px', marginBottom: '8px' }}>Подобрана специальность:</p>

        // ==========================================================================
        // КОРНЕВОЙ КОМПОНЕНТ СТРАНИЦЫ
        // ==========================================================================
        function HomepageApp() {
            const [recentSpecs, setRecentSpecs] = useState([]);
            const [isCabinetOpen, setIsCabinetOpen] = useState(false);

            useEffect(() => {
                const history = JSON.parse(localStorage.getItem('recently_viewed_specs')) || [];
                setRecentSpecs(history);
            }, []);

            return (
                <div>
                    {/* Кнопка Личного кабинета (верхний левый угол) */}
                    <button
                        className="cabinet-toggle-btn"
                        onClick={() => setIsCabinetOpen(prev => !prev)}
                        title="Личный кабинет абитуриента"
                    >
                        <svg viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                        </svg>
                    </button>

                    {/* Выезжающее окно Личного кабинета */}
                    <PersonalCabinet isOpen={isCabinetOpen} onClose={() => setIsCabinetOpen(false)} />

                    {/* Сетка главного меню */}
                    <div className="btn-grid-main">
                        <a href="pages/sso/sso_main.html" className="btn-item">Среднее специальное образование (ССО)</a>
                        <a href="pages/vo/vo_main.html" className="btn-item">Высшее образование (ВО)</a>
                    </div>

                    {/* Вы недавно смотрели */}
                    {recentSpecs.length > 0 && (
                        <div className="recently-viewed" style={{ display: 'inline-flex' }}>
                            <span className="recently-viewed-title">Вы недавно смотрели:</span>
                            <div className="recently-viewed-links">
                                {recentSpecs.map((item, idx) => (
                                    <a key={idx} href={item.url}>{item.title}</a>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-homepage-root'));
        root.render(<HomepageApp />);
    </script>

    <!-- Подключаем стабильную логику ассистента на чистом JS -->
    <script src="js/assistant.js"></script>

    <!-- Скрипт плавных переходов страниц и темы (Vanilla JS) -->
    <script>
        const moonSvg = `<path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />`;
        const sunSvg = `<circle cx="12" cy="12" r="5" /><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-width="2" stroke-linecap="round" stroke="currentColor" />`;

        function updateThemeIcon(isDark) {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.innerHTML = isDark ? sunSvg : moonSvg;
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const checkDark = document.documentElement.classList.contains('dark-mode');
            updateThemeIcon(checkDark);
        });

        // Скрипт плавных переходов
        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('javascript:') && link.hostname === window.location.hostname) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const targetUrl = link.href;
                        const container = document.querySelector('.container');
                        if (container) {
                            container.style.transition = 'opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1), transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
                            container.style.opacity = '0';
                            container.style.transform = 'translateY(-6px)';
                        }
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 220);
                    });
                }
            });
        });
    </script>
