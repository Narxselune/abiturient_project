<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная страница — Система мониторинга</title>
    <link rel="stylesheet" href="css/main.css">

    <!-- Моментальное определение темы до отрисовки для предотвращения вспышек -->
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>

    <!-- Стили загрузки фонов, прописанные напрямую в файле (защита от CORS-блокировок file://) -->
    <style>
        .body-main {
            background-image: url('Fon/litht.jpeg') !important; /* Светлая тема с расширением .jpeg */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.3s ease;
            /* Режим flex-column для размещения заголовка академии НАД рамкой */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Начинаем контент сверху */
            padding: 40px 20px;
        }

        /* При включенной темной теме картинка плавно сменяется на темную */
        .dark-mode .body-main {
            background-image: url('Fon/dark.jpeg') !important; /* Тёмная тема с расширением .jpeg */
        }
    </style>

    <!-- Библиотеки React, ReactDOM и компилятор Babel для работы компонентов -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
</head>
<body class="body-main">
    <!-- Переключатель темы (в правом верхнем углу экрана) -->
    <a href="javascript:void(0)" class="btn-theme" onclick="toggleTheme()" title="Переключить тему">
        <svg id="theme-icon" viewBox="0 0 24 24">
            <!-- Иконка луны по умолчанию -->
            <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />
        </svg>
    </a>

    <!-- Внешний заголовок на фоне (НАД рамкой) -->
    <h1 class="academy-bg-title">Белорусская государственная академия связи</h1>

    <div class="container container-main" style="margin-top: 0;">
        <header class="header-main">
            <h2 class="title-main">ИНФОРМАЦИЯ<br>для абитуриентов</h2>
        </header>

        <!-- Контейнер монтирования React-компонента Главного меню, Истории и Кабинета -->
        <main id="react-homepage-root">
            <div style="text-align: center; padding: 20px; color: #666; font-style: italic;">
                Загрузка данных...
            </div>
        </main>
    </div>

    <!-- Виджет чат-ассистента на Vanilla JS -->
    <div id="ai-assistant" class="ai-widget">
        <button id="ai-toggle-btn" class="ai-toggle-btn" onclick="toggleAssistant()" title="Помощник абитуриента">
            <span class="ai-btn-text">Задать вопрос</span>
        </button>

        <!-- Окно чата -->
        <div id="ai-window" class="ai-window" style="display: none;">
            <div class="ai-header">
                <div class="ai-bot-info">
                    <div class="ai-bot-avatar">
                        <img src="Fon/avatar.jpeg" alt="Ассистент">
                    </div>
                    <div>
                        <div class="ai-bot-name">Ассистент приемной комиссии</div>
                        <div class="ai-bot-status">Онлайн | Псевдо-ИИ</div>
                    </div>
                </div>
                <button class="ai-close-btn" onclick="toggleAssistant()">&times;</button>
            </div>

            <div id="ai-messages" class="ai-messages">
                <div class="ai-message bot">
                    Привет! Я твой интерактивный помощник. Могу подсказать информацию о поступлении в 2026 году. Выбери готовый вопрос или напиши свой ниже!
                </div>
            </div>

            <!-- Быстрые вопросы-кнопки (скрыты по умолчанию на мобильных, показываются при фокусе) -->
            <div id="ai-quick-questions" class="ai-quick-questions">
                <button onclick="sendQuickQuestion('Какие документы нужны?')">📄 Какие документы нужны?</button>
                <button onclick="sendQuickQuestion('Когда заканчивается прием?')">📅 Сроки подачи документов</button>
                <button onclick="sendQuickQuestion('Какая стоимость обучения?')">💰 Стоимость обучения</button>
                <button onclick="sendQuickQuestion('Как работает калькулятор?')">📊 Как работает калькулятор?</button>
            </div>

            <div class="ai-input-container">
                <input type="text" id="ai-user-input" placeholder="Введите ваш вопрос..."
                       onkeydown="handleAssistantKey(event)"
                       onfocus="showQuickQuestions()"
                       onblur="hideQuickQuestions()">
                <button id="ai-send-btn" onclick="sendMessageFromInput()">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- React-компонент Главного меню, Истории и Личного кабинета -->
    <script type="text/babel">
        const { useState, useEffect } = React;

// ==========================================================================
        // КОМПОНЕНТ ЛИЧНОГО КАБИНЕТА С ЧЕК-ЛИСТОМ И ИСПРАВЛЕННЫМ ТЕСТОМ
        // ==========================================================================
        function PersonalCabinet({ isOpen, onClose }) {
            const [activeTab, setActiveTab] = useState('checklist');

            // Состояние фильтров документов
            const [level, setLevel] = useState(() => {
                const saved = localStorage.getItem('chk_level');
                if (saved === 'vo') return 'vo_full';
                return saved || 'sso';
            });
            const [isMinor, setIsMinor] = useState(() => localStorage.getItem('chk_is_minor') || 'no');
            const [form, setForm] = useState(() => localStorage.getItem('chk_form') || 'dnev');

            // Состояние отмеченных документов
            const [checkedItems, setCheckedItems] = useState(() => {
                const saved = localStorage.getItem('chk_checked_items');
                return saved ? JSON.parse(saved) : {};
            });

            // Шаги теста-навигатора (Строго последовательные шаги 1 -> 5 -> Результат)
            const [quizStep, setQuizStep] = useState(1);
            const [targetLevel, setTargetLevel] = useState('');         // sso, vo
            const [targetBase, setTargetBase] = useState('');           // 9, 11, pto, sso_short
            const [targetInterests, setTargetInterests] = useState(''); // code, hardware, marketing, postal_ops, logistics_systems
            const [targetSubInterests, setTargetSubInterests] = useState(''); // web, qa, radio_tv, cable, multi, telecom, automation, networks, intellect, radiotech, manual, auto_qa, infosec, dev, client, trans, net_dev, audit
            const [targetForm, setTargetForm] = useState('dnev');       // dnev, zaoch

            useEffect(() => {
                localStorage.setItem('chk_level', level);
                localStorage.setItem('chk_is_minor', isMinor);
                localStorage.setItem('chk_form', form);
            }, [level, isMinor, form]);

            useEffect(() => {
                localStorage.setItem('chk_checked_items', JSON.stringify(checkedItems));
            }, [checkedItems]);

            if (!isOpen) return null;

            const handleCheckboxChange = (id) => {
                setCheckedItems(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const resetQuiz = () => {
                setQuizStep(1);
                setTargetLevel('');
                setTargetBase('');
                setTargetInterests('');
                setTargetSubInterests('');
                setTargetForm('dnev');
            };

            const getRequiredDocuments = () => {
                const docs = [
                    { id: 'photos', text: '6 цветных фотографий размером 3х4 см' },
                    { id: 'edu_docs', text: 'ОРИГИНАЛЫ и копии всех документов об образовании и приложения к ним (свидетельство о базовом образовании, аттестат, диплом с приложением)' },
                    { id: 'medical', text: 'Медицинская справка о состоянии здоровья по форме, установленной Министерством здравоохранения, с указанием годности к выбранным специальностям (указывается полное наименование специальностей)' },
                    { id: 'benefits', text: 'Документы, подтверждающие право абитуриента на льготы (при их наличии) (оригинал и копия)' },
                    { id: 'vkk_mrek', text: 'Заключение ВКК или МРЭК об отсутствии противопоказаний для обучения по выбранной специальности (для детей-инвалидов до 18 лет, инвалидов I, II и III группы)' },
                    { id: 'marriage', text: 'Копия свидетельства о браке (если документ об образовании и паспорт на разные фамилии)' },
                    { id: 'passport', text: 'Паспорт или заменяющий его документ (предъявляется абитуриентом лично приемной комиссии)' }
                ];

                if (level === 'sso') {
                    if (form === 'zaoch') {
                        docs.push({ id: 'work_book_sso', text: 'Выписка (копия) из трудовой книжки, заверенная администрацией (для поступающих на заочную форму обучения)' });
                    }
                } else if (level === 'vo_full') {
                    docs.push({ id: 'ce_ct_vo', text: 'Оригиналы и копии сертификатов централизованного экзамена (ЦЭ) / централизованного тестирования (ЦТ)' });
                    docs.push({ id: 'med_group_vo', text: 'В медицинской справке при поступлении на группу специальностей указываются все специальности группы' });
                    docs.push({ id: 'char_vo', text: 'Характеристика (необходима тем, кто окончил учреждение образования в год поступления)' });
                } else if (level === 'vo_short') {
                    docs.push({ id: 'char_vo_short', text: 'Характеристика (необходима тем, кто окончил учреждение образования в год поступления)' });
                    if (form === 'zaoch') {
                        docs.push({ id: 'work_book_vo_short', text: 'Выписка (копия) из трудовой книжки, заверенная администрацией (для поступающих на заочную форму обучения)' });
                    }
                }

                if (isMinor === 'yes') {
                    docs.push({ id: 'parent_presence', text: 'Подача документов в присутствии законного представителя (родителя) с его паспортом (для несовершеннолетних абитуриентов)' });
                }

                return docs;
            };

            // Алгоритм подбора по точным направлениям из брошюр
            const calculateRecommendation = () => {
                if (targetBase === 'pto') {
                    return {
                        name: "Почтовая деятельность (на базе ПТО)",
                        desc: "Специализация в области почтовой связи и курьерской логистики на базе профессионально-технического образования в обособленном подразделении академии.",
                        url: "pages/monitoring/mon_sso_pto_spec1.html"
                    };
                }

                if (targetLevel === 'sso') {
                    if (targetBase === '9') {
                        if (targetInterests === 'code') {
                            return targetSubInterests === 'web' ? {
                                name: "Разработка и сопровождение веб-ресурсов (9 кл.)",
                                desc: "Квалификация: Техник-программист. Веб-дизайн, верстка HTML/CSS, программирование на JS/Java/C#, проектирование баз данных SQL.",
                                url: "pages/monitoring/mon_sso_9_spec1.html"
                            } : {
                                name: "Тестирование программного обеспечения (9 кл.)",
                                desc: "Квалификация: Тестировщик. Анализ требований, поиск багов, составление тест-кейсов и автоматизированный контроль качества программных продуктов.",
                                url: "pages/monitoring/mon_sso_9_spec7.html"
                            };
                        } else if (targetInterests === 'hardware') {
                            if (targetSubInterests === 'cable') {
                                return {
                                    name: "Информационные кабельные сети (9 кл.)",
                                    desc: "Квалификация: Техник по телекоммуникациям. Физический монтаж волоконно-оптических линий электросвязи, сварка оптоволокна и технологии «Умного дома».",
                                    url: "pages/monitoring/mon_sso_9_spec3.html"
                                };
                            } else if (targetSubInterests === 'radio_tv') {
                                return {
                                    name: "Техническая эксплуатация систем радиосвязи, радиовещания и телевидения (9 кл.)",
                                    desc: "Квалификация: Техник. Обслуживание радиопередающих центров, сотовых вышек связи, спутниковых систем и цифрового вещания.",
                                    url: "pages/monitoring/mon_sso_9_spec4.html"
                                };
                            } else if (targetSubInterests === 'multi') {
                                return {
                                    name: "Техническая эксплуатация мультимедийных систем (9 кл.)",
                                    desc: "Квалификация: Техник. Работа на телестудиях and радиостанциях, звукозапись, монтаж сценического медиа-оборудования и анимационной графики.",
                                    url: "pages/monitoring/mon_sso_9_spec5.html"
                                };
                            } else {
                                return {
                                    name: "Техническая эксплуатация систем и сетей телекоммуникаций (9 кл.)",
                                    desc: "Квалификация: Техник по телекоммуникациям. Настройка сетевых протоколов, администрирование серверов связи, коммутация каналов и пакетов в РУП «Белтелеком».",
                                    url: "pages/monitoring/mon_sso_9_spec2.html"
                                };
                            }
                        } else {
                            return {
                                name: "Почтовая деятельность (9 кл.)",
                                desc: "Квалификация: Специалист по почтовой деятельности. Работа в отделениях «Белпочта»: кассовые операции, прием/выдача отправлений, курьерская и транспортная деятельность.",
                                url: "pages/monitoring/mon_sso_9_spec6.html"
                            };
                        }
                    } else if (targetBase === '11') {
                        if (targetInterests === 'code') {
                            return {
                                name: "Тестирование программного обеспечения (11 кл.)",
                                desc: "Квалификация: Тестировщик. Интенсивный курс ручного и автоматизированного тестирования ПО на базе средней школы (срок обучения 2 года).",
                                url: "pages/monitoring/mon_sso_11_dnev_spec4.html"
                            };
                        } else if (targetInterests === 'hardware') {
                            const isRadio = targetSubInterests === 'radio_tv';
                            if (targetForm === 'zaoch') {
                                return isRadio ? {
                                    name: "Радиосвязь и ТВ (11 кл., Заочное ССО)",
                                    desc: "Заочное обучение эксплуатации радиоэлектронного оборудования связи и систем вещания.",
                                    url: "pages/monitoring/mon_sso_11_zaoch_spec6.html"
                                } : {
                                    name: "Телекоммуникации (11 кл., Заочное ССО)",
                                    desc: "Заочное освоение сетевого администрирования и эксплуатации современных систем связи.",
                                    url: "pages/monitoring/mon_sso_11_zaoch_spec5.html"
                                };
                            } else {
                                return isRadio ? {
                                    name: "Радиосвязь и ТВ (11 кл., Дневное ССО)",
                                    desc: "Очное практическое обучение эксплуатации беспроводного вещательного оборудования и сотовой связи.",
                                    url: "pages/monitoring/mon_sso_11_dnev_spec2.html"
                                } : {
                                    name: "Телекоммуникации (11 кл., Дневное ССО)",
                                    desc: "Очное освоение монтажа оптических трасс, настройки маршрутизаторов и серверов связи.",
                                    url: "pages/monitoring/mon_sso_11_dnev_spec1.html"
                                };
                            }
                        } else {
                            return targetForm === 'zaoch' ? {
                                name: "Почтовая деятельность (11 кл., Заочное ССО)",
                                desc: "Заочное обучение технологиям обработки, кассовым операциям и курьерской логистике в РУП «Белпочта».",
                                url: "pages/monitoring/mon_sso_11_zaoch_spec7.html"
                            } : {
                                name: "Почтовая деятельность (11 кл., Дневное ССО)",
                                desc: "Очное обучение основам операционной почтовой связи, транспортной логистике и кассовой технике.",
                                url: "pages/monitoring/mon_sso_11_dnev_spec3.html"
                            };
                        }
                    }
                } else { // --- ВЫСШЕЕ ОБРАЗОВАНИЕ (ВО) ---
                    if (targetBase === '11') {
                        if (targetInterests === 'code') {
                            return {
                                name: "Прикладная информатика (ВО)",
                                desc: "Степень: Бакалавр (Информатик.Программист). Информационная безопасность систем связи, BigData, ИИ, глубокое изучение языков разработки.",
                                url: "pages/monitoring/mon_vo_11_spec3.html"
                            };
                        } else if (targetInterests === 'hardware') {
                            return targetSubInterests === 'automation' ? {
                                name: "Автоматизация технологических процессов и производств (ВО)",
                                desc: "Степень: Бакалавр (Инженер). IoT (Интернет вещей), программирование промышленных контроллеров (ПЛК), умные роботизированные системы.",
                                url: "pages/monitoring/mon_vo_11_spec1.html"
                            } : {
                                name: "Системы и сети инфокоммуникаций (ВО, 11 кл.)",
                                desc: "Степень: Бакалавр (Инженер). Глобальное проектирование магистралей связи, беспроводные и оптические мультисервисные системы передачи пакетов.",
                                url: "pages/monitoring/mon_vo_11_spec2.html"
                            };
                        } else if (targetInterests === 'marketing') {
                            return {
                                name: "Маркетинг (ВО, 11 кл.)",
                                desc: "Степень: Бакалавр (Маркетолог.Экономист). Интернет-маркетинг, SEO, веб-аналитика, SWOT-анализ, планирование рекламных кампаний для предприятий связи.",
                                url: "pages/monitoring/mon_vo_11_spec5.html"
                            };
                        } else if (targetInterests === 'logistics_systems') {
                            return {
                                name: "Цифровые клиентские сервисы и почтово-логистические системы (ВО)",
                                desc: "Степень: Бакалавр (Инженер). Облачные логистические технологии, автоматизация складирования, транспортная и международная почтовая деятельность.",
                                url: "pages/monitoring/mon_vo_11_spec4.html"
                            };
                        }
                    } else { // сокращенно после колледжа
                        if (targetInterests === 'code') {
                            return {
                                name: "Прикладная информатика (Дневное сокращенное ВО)",
                                desc: "Степень: Информатик.Программист. Сокращенный срок (2,5 года). Информационная безопасность инфокоммуникационных платформ.",
                                url: "pages/monitoring/mon_vo_sso_dnev_spec2.html"
                            };
                        } else if (targetInterests === 'hardware') {
                            const isIntellect = targetSubInterests === 'intellect';
                            return targetForm === 'zaoch' ? {
                                name: "Системы и сети инфокоммуникаций (Заочное сокращенное ВО)",
                                desc: `Степень: Инженер. Ускоренное обучение (3 года). Выбранный вами профиль: ${isIntellect ? 'Интеллектуальные информационные системы и технологии' : 'Радиотехнологии и цифровое телевидение'}.`,
                                url: "pages/monitoring/mon_vo_sso_zaoch_spec4.html"
                            } : {
                                name: "Системы и networks инфокоммуникаций (Дневное сокращенное ВО)",
                                desc: `Степень: Инженер. Ускоренное обучение (2,5 года). Выбранный вами профиль: ${isIntellect ? 'Интеллектуальные информационные системы и технологии' : 'Радиотехнологии и цифровое телевидение'}.`,
                                url: "pages/monitoring/mon_vo_sso_dnev_spec1.html"
                            };
                        } else if (targetInterests === 'logistics_systems') {
                            return targetForm === 'zaoch' ? {
                                name: "Почтовая связь (Заочное сокращенное ВО)",
                                desc: "Степень: Инженер. Ускоренная заочная подготовка специалистов управления транспортировкой грузов и логистики (3,5 года) на базе ССО.",
                                url: "pages/monitoring/mon_vo_sso_zaoch_spec6.html"
                            } : {
                                name: "Почтовая связь (Дневное сокращенное ВО)",
                                desc: "Степень: Инженер. Очное ускоренное обучение (3 года) управлению логистическими потоками и автоматизации почтовых сетей.",

    <!-- Скрипт плавных переходов страниц и темы (Vanilla JS) -->
    <script>
        const moonSvg = `<path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />`;
        const sunSvg = `<circle cx="12" cy="12" r="5" /><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-width="2" stroke-linecap="round" stroke="currentColor" />`;

        function updateThemeIcon(isDark) {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.innerHTML = isDark ? sunSvg : moonSvg;
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const checkDark = document.documentElement.classList.contains('dark-mode');
            updateThemeIcon(checkDark);
        });

        // Скрипт плавных переходов
        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('javascript:') && link.hostname === window.location.hostname) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const targetUrl = link.href;
                        const container = document.querySelector('.container');
                        if (container) {
                            container.style.transition = 'opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1), transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
                            container.style.opacity = '0';
                            container.style.transform = 'translateY(-6px)';
                        }
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 220);
                    });
                }
            });
        });
    </script>
