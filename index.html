<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Базовые SEO метатеги -->
    <title>Главная страница — Система мониторинга Белорусской государственной академии связи</title>
    <meta name="description" content="Интерактивный помощник абитуриента Белорусской государственной академии связи. Следите за ходом приема документов, оценивайте свои шансы и выбирайте специальность онлайн.">
    <meta name="keywords" content="БГАС, Белорусская государственная академия связи, приемная комиссия БГАС, мониторинг БГАС, калькулятор баллов БГАС, поступление 2026, колледж БГАС, связь Минск">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://your-domain.by/index.html">

    <!-- Open Graph метатеги (для Telegram, Viber, VK) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Система мониторинга абитуриентов БГАС — Выберите специальность">
    <meta property="og:description" content="Узнайте проходные баллы, оцените свои шансы на поступление с помощью калькулятора и получите консультацию ассистента онлайн.">
    <meta property="og:image" content="Fon/avatar.jpeg">
    <meta property="og:url" content="https://your-domain.by/index.html">

    <!-- Оптимизация загрузки (Performance: Resource Hints) -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Стили -->
    <link rel="stylesheet" href="css/main.css">

    <!-- Моментальное определение темы до отрисовки для предотвращения вспышек (FOUC) -->
    <script>
        try {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        } catch (e) {
            console.warn("Конфиденциальный режим или настройки браузера блокируют доступ к localStorage:", e);
        }
    </script>

    <!-- Библиотеки React, ReactDOM и компилятор Babel для работы компонентов -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>

    <!-- ПОДКЛЮЧЕНИЕ JQUERY И JQUERY UI (НЕОБХОДИМЫ ДЛЯ ИНТЕРФЕЙСА ЧАТА-АССИСТЕНТА) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/smoothness/jquery-ui.css">
</head>
<body class="body-main">
    <!-- Переключатель темы (в правом верхнем углу экрана) -->
    <a href="javascript:void(0)" class="btn-theme" onclick="toggleTheme()" title="Переключить тему">
        <svg id="theme-icon" viewBox="0 0 24 24">
            <!-- Иконка луны по умолчанию -->
            <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />
        </svg>
    </a>

    <!-- Внешний заголовок на фоне (НАД рамкой) -->
    <h1 class="academy-bg-title">Белорусская государственная академия связи</h1>

    <div class="container container-main" style="margin-top: 0;">
        <header class="header-main">
            <h2 class="title-main">ИНФОРМАЦИЯ<br>для абитуриентов</h2>
        </header>

        <!-- Контейнер монтирования React-компонента Главного меню, Истории и Кабинета -->
        <main id="react-homepage-root">
            <div style="text-align: center; padding: 20px; color: #666; font-style: italic;">
                Загрузка данных...
            </div>
        </main>
    </div>

    <!-- Виджет чат-ассистента на Vanilla JS -->
    <div id="ai-assistant" class="ai-widget">
        <button id="ai-toggle-btn" class="ai-toggle-btn" onclick="toggleAssistant()" title="Помощник абитуриента">
            <span class="ai-btn-text">Задать вопрос</span>
        </button>

        <!-- Окно чата -->
        <div id="ai-window" class="ai-window" style="display: none;">
            <div class="ai-header">
                <div class="ai-bot-info">
                    <div class="ai-bot-avatar">
                        <img src="Fon/avatar.jpeg" alt="Ассистент приемной комиссии">
                    </div>
                    <div>
                        <div class="ai-bot-name">Ассистент приемной комиссии</div>
                        <div class="ai-bot-status">Онлайн | Псевдо-ИИ</div>
                    </div>
                </div>
                <button class="ai-close-btn" onclick="toggleAssistant()">&times;</button>
            </div>

            <div id="ai-messages" class="ai-messages">
                <div class="ai-message bot">
                    Привет! Я твой интерактивный помощник. Могу подсказать информацию о поступлении в 2026 году. Выбери готовый вопрос или напиши свой ниже!
                </div>
            </div>

            <!-- Быстрые вопросы-кнопки (управление видимостью через CSS-класс visible) -->
            <div id="ai-quick-questions" class="ai-quick-questions">
                <button onclick="sendQuickQuestion('Время работы приемной комиссии')">🕒 Время работы комиссии</button>
                <button onclick="sendQuickQuestion('Какие документы нужны?')">📄 Какие документы нужны?</button>
                <button onclick="sendQuickQuestion('Когда заканчивается прием?')">📅 Сроки подачи документов</button>
                <button onclick="sendQuickQuestion('Какая стоимость обучения?')">💰 Стоимость обучения</button>
                <button onclick="sendQuickQuestion('Как работает калькулятор?')">📊 Как работает калькулятор?</button>
            </div>

            <div class="ai-input-container">
                <!-- Скрытием управляет глобальный клик по документу для исключения конфликтов на смартфонах -->
                <input type="text" id="ai-user-input" placeholder="Введите ваш вопрос..."
                       onfocus="showQuickQuestions()"
                       onkeydown="handleAssistantKey(event)"
                       onblur="hideQuickQuestions()">
                <button id="ai-send-btn" onclick="sendMessageFromInput()">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path d="M2 21l21-9L2 3v7l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Подключаем вынесенный компонент Личного кабинета -->
    <script type="text/babel" src="js/cabinet.js"></script>

    <!-- React-компонент Главного меню, Истории и Личного кабинета -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function HomepageApp() {
            const [recentSpecs, setRecentSpecs] = useState([]);
            const [isCabinetOpen, setIsCabinetOpen] = useState(false);

            useEffect(() => {
                try {
                    const history = JSON.parse(localStorage.getItem('recently_viewed_specs')) || [];
                    setRecentSpecs(history);
                } catch (e) {
                    console.warn("Доступ к localStorage заблокирован:", e);
                }
            }, []);

            // Безопасное определение наличия компонента Кабинета
            const CabinetComponent = typeof PersonalCabinet !== 'undefined' ? PersonalCabinet : null;

            if (!CabinetComponent && window.location.protocol === 'file:') {
                console.warn("Внимание: Вы запустили сайт через протокол file://. Мобильные и некоторые десктопные браузеры блокируют загрузку внешнего файла js/cabinet.js из-за CORS. Для полноценной работы Личного Кабинета используйте локальный веб-сервер (например, Live Server в VS Code) или загрузите проект на хостинг.");
            }

            return (
                <div>
                    {/* Кнопка Личного кабинета */}
                    {CabinetComponent && (
                        <button
                            className="cabinet-toggle-btn"
                            onClick={() => setIsCabinetOpen(prev => !prev)}
                            title="Личный кабинет абитуриента"
                        >
                            <svg viewBox="0 0 24 24">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                            </svg>
                        </button>
                    )}

                    {/* Выезжающее окно Личного кабинета */}
                    {CabinetComponent && <CabinetComponent isOpen={isCabinetOpen} onClose={() => setIsCabinetOpen(false)} />}

                    {/* Сетка главного меню */}
                    <div className="btn-grid-main">
                        <a href="pages/sso/sso_main.html" className="btn-item">Среднее специальное образование (ССО)</a>
                        <a href="pages/vo/vo_main.html" className="btn-item">Высшее образование (ВО)</a>
                    </div>

                    {/* Вы недавно смотрели */}
                    {recentSpecs.length > 0 && (
                        <div className="recently-viewed" style={{ display: 'inline-flex' }}>
                            <span className="recently-viewed-title">Вы недавно смотрели:</span>
                            <div className="recently-viewed-links">
                                {recentSpecs.map((item, idx) => (
                                    <a key={idx} href={item.url}>{item.title}</a>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-homepage-root'));
        root.render(<HomepageApp />);
    </script>

    <!-- Подключаем стабильную логику ассистента на чистом JS -->
    <script src="js/assistant.js"></script>

    <!-- Скрипт плавных переходов страниц и темы (Vanilla JS) -->
    <script>
        const moonSvg = `<path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />`;
        const sunSvg = `<circle cx="12" cy="12" r="5" /><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-width="2" stroke-linecap="round" stroke="currentColor" />`;

        function updateThemeIcon(isDark) {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.innerHTML = isDark ? sunSvg : moonSvg;
            }
        }

        function toggleTheme() {
            try {
                const isDark = document.documentElement.classList.toggle('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                updateThemeIcon(isDark);
            } catch (e) {
                const isDark = document.documentElement.classList.toggle('dark-mode');
                updateThemeIcon(isDark);
            }
        }

        // Инициализация правильной иконки темы при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            const isDark = document.documentElement.classList.contains('dark-mode');
            updateThemeIcon(isDark);
        });
    </script>
</body>
</html>
