<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уровень ССО — Панель управления</title>

    <!-- ИСПОЛЬЗОВАНИЕ JQUERY UI / BOOTSTRAP: Подключение стилей CSS сетки фреймворка Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Подключаем основной файл стилей после Bootstrap -->
    <link rel="stylesheet" href="../../css/main.css">

    <!-- БАЗОВАЯ ОПТИМИЗАЦИЯ ВЕБ-СТРАНИЦ (PERFORMANCE, SEO): Определение темной темы до рендеринга страницы -->
    <script>
        try {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        } catch (e) {
            console.warn("Доступ к localStorage заблокирован:", e);
        }
    </script>
</head>
<body>
    <!-- ДОБАВЛЕНИЕ ИНТЕРАКТИВНОСТИ ПРИ ПОМОЩИ BOM/DOM: Элементы навигации на главную и смены темы -->
    <a href="../../index.html" class="btn-home" title="На главную">
        <svg viewBox="0 0 24 24">
            <rect x="16" y="4" width="3" height="5" />
            <path d="M12 2.5L2 10.5h2v10a1 1 0 0 0 1 1h6v-6h2v6h6a1 1 0 0 0 1-1v-10h2L12 2.5z" />
        </svg>
    </a>
    <a href="javascript:void(0)" class="btn-theme" onclick="toggleTheme()" title="Переключить тему">
        <svg id="theme-icon" viewBox="0 0 24 24">
            <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />
        </svg>
    </a>

    <div class="container">
        <header>
            <a href="../../index.html" class="btn-back">← Назад</a>
            <h1>Абитуриентам<br>среднего специального<br>образования</h1>
        </header>

        <!-- ИСПОЛЬЗОВАНИЕ JQUERY UI / BOOTSTRAP: Структурирование при помощи Bootstrap-утилит Flexbox без изменения оригинального вида -->
        <main class="container-fluid px-0">
            <div class="row justify-content-center m-0">
                <div class="col-12">
                    <div class="d-flex flex-column align-items-center">
                        <a href="sso_9_classes.html" class="btn-item">База 9 классов</a>
                        <a href="sso_11_classes.html" class="btn-item">База 11 классов</a>
                        <a href="sso_pto.html" class="btn-item">Профессионально-техническое образование (ПТО)</a>
                        <a href="sso_info.html" class="btn-item">Информация по специальностям ССО</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ДОБАВЛЕНИЕ ИНТЕРАКТИВНОСТИ ПРИ ПОМОЩИ BOM/DOM: Плавный увод страницы в прозрачность при кликах на ссылки и сохранение темы -->
    <script>
        const moonSvg = `<path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />`;
        const sunSvg = `<circle cx="12" cy="12" r="5" /><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-width="2" stroke-linecap="round" stroke="currentColor" />`;

        function updateThemeIcon(isDark) {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.innerHTML = isDark ? sunSvg : moonSvg;
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const isDark = document.documentElement.classList.contains('dark-mode');
            updateThemeIcon(isDark);
        });

        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('javascript:') && link.hostname === window.location.hostname) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const targetUrl = link.href;
                        const container = document.querySelector('.container');
                        if (container) {
                            container.style.transition = 'opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1), transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
                            container.style.opacity = '0';
                            container.style.transform = 'translateY(-6px)';
                        }
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 220);
                    });
                }
            });
        });
    </script>
</body>
</html>
