<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- БАЗОВАЯ ОПТИМИЗАЦИЯ ВЕБ-СТРАНИЦ (PERFORMANCE, SEO): Определение темной темы до рендеринга макета -->
    <script>
        try {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        } catch (e) {
            console.warn("Доступ к localStorage заблокирован:", e);
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Абитуриентам после 11 класса — ССО</title>
    <link rel="stylesheet" href="../../css/main.css">

    <!-- БАЗОВАЯ ОПТИМИЗАЦИЯ ВЕБ-СТРАНИЦ (PERFORMANCE, SEO): CDN загрузка React, Babel и библиотеки XLSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
</head>
<body>
    <!-- ДОБАВЛЕНИЕ ИНТЕРАКТИВНОСТИ ПРИ ПОМОЩИ BOM/DOM: Кнопки навигации и настройки темы оформления -->
    <a href="../../index.html" class="btn-home" title="На главную">
        <svg viewBox="0 0 24 24">
            <rect x="16" y="4" width="3" height="5" />
            <path d="M12 2.5L2 10.5h2v10a1 1 0 0 0 1 1h6v-6h2v6h6a1 1 0 0 0 1-1v-10h2L12 2.5z" />
        </svg>
    </a>
    <a href="javascript:void(0)" class="btn-theme" onclick="toggleTheme()" title="Переключить тему">
        <svg id="theme-icon" viewBox="0 0 24 24">
            <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />
        </svg>
    </a>

    <div class="container">
        <header>
            <a href="sso_main.html" class="btn-back">← Назад</a>
            <h1>Абитуриентам после 11 класса</h1>
            <h2>Среднее специальное образование</h2>
        </header>

        <main id="react-calculator-root">
            <div class="academy-loader-container">
                <div class="cap-wrapper">
                    <svg class="mortarboard-svg" viewBox="0 0 64 64">
                        <path d="M16 32 V38 C16 43 23 46 32 46 C41 46 48 43 48 38 V32" fill="none" stroke="#007bff" stroke-width="3" stroke-linecap="round" />
                        <polygon points="32,10 58,22 32,34 6,22" fill="#007bff" stroke="#007bff" stroke-width="1" />
                        <path class="cap-tassel" d="M32,22 L46,27 V37" fill="none" stroke="#ff9800" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                        <circle cx="32" cy="22" r="2" fill="#ffffff" />
                    </svg>
                </div>
                <div class="loader-text">Загрузка данных...</div>
            </div>
        </main>
    </div>

    <!-- ИСПОЛЬЗОВАНИЕ ФРЕЙМВОРКА REACT: Инициализация интерактивного калькулятора -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SHEET_ID = '1uFwZs-jzJiUkZk6U266bo4QbmwjAjoUcc0pKAabWhos';
        const XLSX_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=xlsx`;

        const specsConfig = [
            { id: 1, name: "Техническая эксплуатация систем и сетей телекоммуникаций (Дневное)", offset: 356, hasPaid: true, offsetPaid: 372, url: "../monitoring/mon_sso_11_dnev_spec1.html" },
            { id: 2, name: "Техническая эксплуатация систем радиосвязи, радиовещания и телевидения (Дневное)", offset: 388, hasPaid: true, offsetPaid: 404, url: "../monitoring/mon_sso_11_dnev_spec2.html" },
            { id: 3, name: "Почтовая деятельность (Дневное)", offset: 420, hasPaid: true, offsetPaid: 436, url: "../monitoring/mon_sso_11_dnev_spec3.html" },
            { id: 4, name: "Тестирование программного обеспечения (Дневное)", offset: 324, hasPaid: true, offsetPaid: 340, url: "../monitoring/mon_sso_11_dnev_spec4.html" },
            { id: 5, name: "Техническая эксплуатация систем и сетей телекоммуникаций (Заочное)", offset: 454, hasPaid: true, offsetPaid: 470, url: "../monitoring/mon_sso_11_zaoch_spec5.html" },
            { id: 6, name: "Техническая эксплуатация систем радиосвязи, радиовещания и телевидения (Заочное)", offset: 486, hasPaid: true, offsetPaid: 502, url: "../monitoring/mon_sso_11_zaoch_spec6.html" },
            { id: 7, name: "Почтовая деятельность (Заочное)", offset: 518, hasPaid: true, offsetPaid: 534, url: "../monitoring/mon_sso_11_zaoch_spec7.html" }
        ];

        function getCell(sheet, r, c) {
            if (!sheet) return '';
            const addr = XLSX.utils.encode_cell({ r, c });
            return sheet[addr] ? sheet[addr].v : '';
        }

        function parseBlockData(sheet, offset) {
            const plan = parseInt(getCell(sheet, offset + 10, 2), 10) || 0;
            let applications = [];
            for (let col = 4, score = 10.0; col <= 74; col++, score = +(score - 0.1).toFixed(1)) {
                let count = parseInt(getCell(sheet, offset + 10, col), 10) || 0;
                if (count > 0) applications.push({ score: +score.toFixed(1), count });
            }
            return { plan, applications };
        }

        function getPosition(applications, userScore) {
            const count = applications
                .filter(app => app.score >= userScore)
                .reduce((sum, app) => sum + app.count, 0);
            return count + 1;
        }

        function Sso11Calculator() {
            const [score, setScore] = useState('');
            const [workbook, setWorkbook] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch(XLSX_URL)
                    .then(res => {
                        if (!res.ok) throw new Error();
                        return res.arrayBuffer();
                    })
                    .then(buffer => {
                        const wb = XLSX.read(buffer, { type: 'array' });
                        setWorkbook(wb);
                        setLoading(false);
                    })
                    .catch(() => {
                        setLoading(false);
                    });
            }, []);

            /* ДОБАВЛЕНИЕ ИНТЕРАКТИВНЫХ КОМПОНЕНТОВ (СЛАЙДЕРЫ, ФОРМЫ, ФИЛЬТРЫ) С ОБРАБОТКОЙ ДАННЫХ ПОЛЬЗОВАТЕЛЯ: Считывание числового балла */
            const handleScoreInput = (e) => {
                let val = e.target.value.replace(/[^0-9.,]/g, '').replace(',', '.');

                const dotIndex = val.indexOf('.');
                if (dotIndex !== -1) {
                    const integerPart = val.substring(0, dotIndex);
                    let fractionalPart = val.substring(dotIndex + 1).replace(/\./g, '');
                    if (fractionalPart.length > 1) {
                        fractionalPart = fractionalPart.substring(0, 1);
                    }
                    val = integerPart + '.' + fractionalPart;
                }

                const checkNum = parseFloat(val);
                if (!isNaN(checkNum) && checkNum > 10) {
                    val = '10';
                }
                setScore(val);
            };

            const clearSearch = () => {
                setScore('');
            };

            let results = [];
            let isValidScore = false;

            /* ДОБАВЛЕНИЕ ИНТЕРАКТИВНЫХ КОМПОНЕНТОВ (СЛАЙДЕРЫ, ФОРМЫ, ФИЛЬТРЫ) С ОБРАБОТКОЙ ДАННЫХ ПОЛЬЗОВАТЕЛЯ: Динамический пересчет списков зачислений */
            if (score && workbook) {
                const userScore = parseFloat(score);
                if (!isNaN(userScore) && userScore >= 1.0 && userScore <= 10.0) {
                    isValidScore = true;
                    const sheetBudget = workbook.Sheets[workbook.SheetNames[0]];
                    let calculatedSpecs = [];

                    specsConfig.forEach(spec => {
                        const budgetData = parseBlockData(sheetBudget, spec.offset);
                        const budgetPos = getPosition(budgetData.applications, userScore);

                        let paidPos = 0;
                        let paidPlan = 0;

                        if (spec.hasPaid) {
                            const paidData = parseBlockData(sheetBudget, spec.offsetPaid);
                            paidPlan = paidData.plan;
                            paidPos = getPosition(paidData.applications, userScore);
                        }

                        const budgetRatio = budgetData.plan > 0 ? (budgetPos / budgetData.plan) : Infinity;
                        const paidRatio = paidPlan > 0 ? (paidPos / paidPlan) : Infinity;
                        const bestRatio = Math.min(budgetRatio, paidRatio);

                        calculatedSpecs.push({
                            name: spec.name,
                            url: spec.url,
                            budget: { position: budgetPos, plan: budgetData.plan },
                            paid: { position: paidPos, plan: paidPlan, exists: spec.hasPaid },
                            bestRatio: bestRatio
                        });
                    });

                    calculatedSpecs.sort((a, b) => {
                        const aPassesBudget = a.budget.plan > 0 && a.budget.position <= a.budget.plan;
                        const bPassesBudget = b.budget.plan > 0 && b.budget.position <= b.budget.plan;
                        const aPassesPaid = a.paid.exists && a.paid.plan > 0 && a.paid.position <= a.paid.plan;
                        const bPassesPaid = b.paid.exists && b.paid.plan > 0 && b.paid.position <= b.paid.plan;

                        let aPriority = 3;
                        if (aPassesBudget) aPriority = 1;
                        else if (aPassesPaid) aPriority = 2;

                        let bPriority = 3;
                        if (bPassesBudget) bPriority = 1;
                        else if (bPassesPaid) bPriority = 2;

                        if (aPriority !== bPriority) return aPriority - bPriority;
                        return a.bestRatio - b.bestRatio;
                    });

                    results = calculatedSpecs;
                }
            }

            const getColorClass = (position, plan) => {
                if (position <= plan) {
                    if (position >= plan * 0.9) return 'text-yellow';
                    return 'text-green';
                }
                return 'text-red';
            };

            return (
                <div>
                    <div className="search-container">
                        <input
                            type="text"
                            className="score-search-input"
                            placeholder={loading ? "Загрузка данных..." : "Введите средний балл"}
                            value={score}
                            onChange={handleScoreInput}
                            disabled={loading}
                        />
                        {score && (
                            <span className="search-clear" style={{ display: 'block' }} onClick={clearSearch}>&times;</span>
                        )}
                    </div>

                    {score && (
                        <div className="search-results-box" style={{ display: 'block' }}>
                            {!isValidScore ? (
                                <div style={{ padding: '15px', textAlign: 'center', color: '#888' }}>
                                    Введите корректный балл от 1.0 до 10.0
                                </div>
                            ) : (
                                results.map((spec, idx) => {
                                    const bClass = getColorClass(spec.budget.position, spec.budget.plan);
                                    let paidHtml = null;

                                    if (spec.paid.exists) {
                                        if (spec.paid.plan > 0) {
                                            const pClass = getColorClass(spec.paid.position, spec.paid.plan);
                                            paidHtml = (
                                                <div className="search-paid-line">
                                                    ваша позиция на платное: <span className={pClass}>{spec.paid.position} из {spec.paid.plan}</span>
                                                </div>
                                            );
                                        } else {
                                            paidHtml = <div className="search-paid-line">ваша позиция на платное: нет мест / план не задан</div>;
                                        }
                                    } else {
                                        paidHtml = <div className="search-paid-line">ваша позиция на платное: прием не осуществляется</div>;
                                    }

                                    return (
                                        <a key={idx} href={spec.url} className="search-result-item">
                                            <div className="search-result-name">{spec.name}</div>
                                            <div className="search-result-info">
                                                <div className="search-budget-line">
                                                    ваша позиция на бюджет: <span className={bClass}>{spec.budget.position} из {spec.budget.plan}</span>
                                                </div>
                                                {paidHtml}
                                            </div>
                                        </a>
                                    );
                                })
                            )}
                        </div>
                    )}

                    {!score && (
                        <div className="columns-container" id="default-columns">
                            <div className="column">
                                <h3>Дневная форма получения образования</h3>
                                <div className="btn-grid">
                                    <a href="../monitoring/mon_sso_11_dnev_spec1.html" className="btn-item">Техническая эксплуатация систем и сетей телекоммуникаций<span className="spec-duration">(2 года 10 месяцев)</span></a>
                                    <a href="../monitoring/mon_sso_11_dnev_spec2.html" className="btn-item">Техническая эксплуатация систем радиосвязи, радиовещания и телевидения<span className="spec-duration">(2 года 10 месяцев)</span></a>
                                    <a href="../monitoring/mon_sso_11_dnev_spec3.html" className="btn-item">Почтовая деятельность<span className="spec-duration">(2 года)</span></a>
                                    <a href="../monitoring/mon_sso_11_dnev_spec4.html" className="btn-item">Тестирование программного обеспечения<span className="spec-duration">(2 года)</span></a>
                                </div>
                            </div>
                            <div className="column">
                                <h3>Заочная форма получения образования</h3>
                                <div className="btn-grid">
                                    <a href="../monitoring/mon_sso_11_zaoch_spec5.html" className="btn-item">Техническая эксплуатация систем и сетей телекоммуникаций<span className="spec-duration">(3 года 10 месяцев)</span></a>
                                    <a href="../monitoring/mon_sso_11_zaoch_spec6.html" className="btn-item">Техническая эксплуатация систем радиосвязи, радиовещания и телевидения<span className="spec-duration">(2 года 10 месяцев)</span></a>
                                    <a href="../monitoring/mon_sso_11_zaoch_spec7.html" className="btn-item">Почтовая деятельность<span className="spec-duration">(2 года)</span></a>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-calculator-root'));
        root.render(<Sso11Calculator />);
    </script>

    <script src="../monitoring/monitoring.js"></script>
</body>
</html>
