<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информация по специальностям ССО</title>
    <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="sso_main.html" class="btn-back">← Назад</a>
            <h1>Информация по специальностям ССО</h1>
        </header>

        <main>
            <div class="slider-container">
                <div class="slider-controls">
                    <label for="level-select">Выберите базу: </label>
                    <select id="level-select" class="select-level" onchange="changeBase()">
                        <option value="9">База 9 классов</option>
                        <option value="11">База 11 классов</option>
                        <option value="pto">Профессионально-техническое образование (ПТО)</option>
                    </select>
                </div>

                <div class="slider-book">
                    <h3 id="spec-title">Загрузка...</h3>
                    <p id="spec-text" style="margin-top: 15px; color: #555; line-height: 1.6;"></p>
                </div>

                <div class="slider-nav-btns">
                    <button class="btn-arrow" onclick="prevPage()">← Пред.</button>
                    <span id="page-num" style="font-weight: bold; margin: 0 10px;">1 / 7</span>
                    <button class="btn-arrow" onclick="nextPage()">След. →</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Данные для Базы 9 классов (строго 7 специальностей)
        const data9 = [
            { title: "Специальность 1 (9 кл.)", text: "" },
            { title: "Специальность 2 (9 кл.)", text: "" },
            { title: "Специальность 3 (9 кл.)", text: "" },
            { title: "Специальность 4 (9 кл.)", text: "" },
            { title: "Специальность 5 (9 кл.)", text: "" },
            { title: "Специальность 6 (9 кл.)", text: "" },
            { title: "Специальность 7 (9 кл.)", text: "" }
        ];

        // Данные для Базы 11 классов (строго 4 специальности)
        const data11 = [
            { title: "Специальность 1 (11 кл.)", text: "" },
            { title: "Специальность 2 (11 кл.)", text: "" },
            { title: "Специальность 3 (11 кл.)", text: "" },
            { title: "Специальность 4 (11 кл.)", text: "" }
        ];

        // Данные для базы ПТО (строго 1 специальность)
        const dataPto = [
            { title: "Специальность 1 (ПТО)", text: "" }
        ];

        let currentData = data9;
        let currentIndex = 0;

        function updateSlider() {
            const item = currentData[currentIndex];
            document.getElementById("spec-title").innerText = item.title;
            document.getElementById("spec-text").innerText = item.text;
            document.getElementById("page-num").innerText = `${currentIndex + 1} / ${currentData.length}`;
        }

        function changeBase() {
            const select = document.getElementById("level-select");

            if (select.value === "9") {
                currentData = data9;
            } else if (select.value === "11") {
                currentData = data11;
            } else if (select.value === "pto") {
                currentData = dataPto;
            }

            currentIndex = 0; // Сбрасываем на первую страницу при смене базы
            updateSlider();
        }

        function nextPage() {
            if (currentIndex < currentData.length - 1) {
                currentIndex++;
            } else {
                currentIndex = 0; // закольцовываем
            }
            updateSlider();
        }

        function prevPage() {
            if (currentIndex > 0) {
                currentIndex--;
            } else {
                currentIndex = currentData.length - 1; // закольцовываем в обратную сторону
            }
            updateSlider();
        }

        // Первичная инициализация при открытии страницы
        window.onload = updateSlider;
    </script>
</body>
</html>
