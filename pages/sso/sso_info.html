<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- БАЗОВАЯ ОПТИМИЗАЦИЯ ВЕБ-СТРАНИЦ (PERFORMANCE, SEO): Загрузка темы в head для исключения белой вспышки -->
    <script>
        try {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        } catch (e) {
            console.warn("Доступ к localStorage заблокирован:", e);
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информация по специальностям ССО</title>
    <link rel="stylesheet" href="../../css/main.css">

    <!-- БАЗОВАЯ ОПТИМИЗАЦИЯ ВЕБ-СТРАНИЦ (PERFORMANCE, SEO): Оптимизация CDN ресурсов -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
</head>
<body>
    
    <div class="container">
        <header>
            <a href="sso_main.html" class="btn-back">← Назад</a>
            <h1>Информация по<br>специальностям ССО</h1>
        </header>

        <main id="react-slider-root">
            <div class="academy-loader-container">
                <div class="cap-wrapper">
                    <svg class="mortarboard-svg" viewBox="0 0 64 64">
                        <path d="M16 32 V38 C16 43 23 46 32 46 C41 46 48 43 48 38 V32" fill="none" stroke="#007bff" stroke-width="3" stroke-linecap="round" />
                        <polygon points="32,10 58,22 32,34 6,22" fill="#007bff" stroke="#007bff" stroke-width="1" />
                        <path class="cap-tassel" d="M32,22 L46,27 V37" fill="none" stroke="#ff9800" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                        <circle cx="32" cy="22" r="2" fill="#ffffff" />
                    </svg>
                </div>
                <div class="loader-text">Загрузка данных...</div>
            </div>
        </main>
    </div>

    <!-- ИСПОЛЬЗОВАНИЕ ФРЕЙМВОРКА REACT: Инициализация интерактивного слайдера-галереи специальностей -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const data9 = [
            { img: "../../SSO/photo_1.webp" },
            { img: "../../SSO/photo_2.webp" },
            { img: "../../SSO/photo_3.webp" },
            { img: "../../SSO/photo_4.webp" },
            { img: "../../SSO/photo_5.webp" },
            { img: "../../SSO/photo_6.webp" },
            { img: "../../SSO/photo_7.webp" }
        ];

        const data11 = [
            { img: "../../SSO/photo_1.webp" },
            { img: "../../SSO/photo_2.webp" },
            { img: "../../SSO/photo_3.webp" },
            { img: "../../SSO/photo_5.webp" }
        ];

        const dataPto = [
            { img: "../../SSO/photo_5.webp" }
        ];

        function SsoInfoSlider() {
            const [base, setBase] = useState('9');
            const [slides, setSlides] = useState(data9);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [lightboxImg, setLightboxImg] = useState(null);

            const handleBaseChange = (e) => {
                const value = e.target.value;
                setBase(value);
                setCurrentIndex(0);
                if (value === '9') setSlides(data9);
                else if (value === '11') setSlides(data11);
                else if (value === 'pto') setSlides(dataPto);
            };

            const nextSlide = () => {
                setCurrentIndex(prev => (prev < slides.length - 1 ? prev + 1 : 0));
            };

            const prevSlide = () => {
                setCurrentIndex(prev => (prev > 0 ? prev - 1 : slides.length - 1));
            };

            /* ДОБАВЛЕНИЕ ИНТЕРАКТИВНОСТИ ПРИ ПОМОЩИ BOM/DOM: Перехват нажатия стрелок клавиатуры и Esc для перелистывания и закрытия слайдера */
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowLeft') {
                        prevSlide();
                    } else if (e.key === 'ArrowRight') {
                        nextSlide();
                    } else if (e.key === 'Escape') {
                        setLightboxImg(null);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                };
            }, [slides, currentIndex]);

            useEffect(() => {
                if (lightboxImg) {
                    setLightboxImg(slides[currentIndex].img);
                }
            }, [currentIndex]);

            /* ДОБАВЛЕНИЕ ИНТЕРАКТИВНЫХ КОМПОНЕНТОВ (СЛАЙДЕРЫ, ФОРМЫ, ФИЛЬТРЫ) С ОБРАБОТКОЙ ДАННЫХ ПОЛЬЗОВАТЕЛЯ: Слайдер смены изображений и модальное окно полноэкранного просмотра */
            return (
                <div class="slider-container">
                    <div className="slider-controls">
                        <label htmlFor="level-select">Выберите базу: </label>
                        <select id="level-select" className="select-level" value={base} onChange={handleBaseChange}>
                            <option value="9">База 9 классов</option>
                            <option value="11">База 11 классов</option>
                            <option value="pto">Профессионально-техническое образование (ПТО)</option>
                        </select>
                    </div>

                    <div className="slider-book" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '340px', padding: '10px' }}>
                        <img
                            className="slider-book-img"
                            src={slides[currentIndex].img}
                            alt="Специальность"
                            onClick={() => setLightboxImg(slides[currentIndex].img)}
                        />
                    </div>

                    <div className="slider-nav-btns">
                        <button className="btn-arrow" onClick={prevSlide}>← Пред.</button>
                        <span style={{ fontWeight: 'bold', margin: '0 10px' }}>{currentIndex + 1} / {slides.length}</span>
                        <button className="btn-arrow" onClick={nextSlide}>След. →</button>
                    </div>

                    {lightboxImg && (
                        <div className="lightbox active" onClick={() => setLightboxImg(null)}>
                            <span className="lightbox-close" onClick={() => setLightboxImg(null)}>&times;</span>
                            <img className="lightbox-content" src={lightboxImg} alt="Просмотр" onClick={(e) => e.stopPropagation()} />
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-slider-root'));
        root.render(<SsoInfoSlider />);
    </script>
    <script src="../monitoring/monitoring.js"></script>
</body>
</html>
