<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Абитуриентам после 11 класса — ВО</title>
    <link rel="stylesheet" href="../../css/main.css">

    <!-- Библиотека XLSX для парсинга таблиц -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Библиотеки React, ReactDOM и компилятор Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
</head>
<body>
    <a href="../../index.html" class="btn-home" title="На главную">
        <svg viewBox="0 0 24 24">
            <rect x="16" y="4" width="3" height="5" />
            <path d="M12 2.5L2 10.5h2v10a1 1 0 0 0 1 1h6v-6h2v6h6a1 1 0 0 0 1-1v-10h2L12 2.5z" />
        </svg>
    </a>
    <a href="javascript:void(0)" class="btn-theme" onclick="toggleTheme()" title="Переключить тему">
        <svg id="theme-icon" viewBox="0 0 24 24">
            <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />
        </svg>
    </a>

    <div class="container">
        <header>
            <a href="vo_main.html" class="btn-back">← Назад</a>
            <h1>Абитуриентам после 11 класса</h1>
            <h2>Общее высшее образование</h2>
        </header>

        <!-- Контейнер монтирования React-приложения -->
        <main id="react-calculator-root">
            <div style="text-align: center; padding: 20px; color: #666; font-style: italic;">
                Загрузка данных...
            </div>
        </main>
    </div>

    <!-- React-компонент калькулятора ВО 11 классов -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SHEET_ID = '1uFwZs-jzJiUkZk6U266bo4QbmwjAjoUcc0pKAabWhos';
        const XLSX_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=xlsx`;

        const specsConfig = [
            { id: 1, name: "Автоматизация технологических процессов и производств", offset: 32, hasPaid: true, offsetPaid: 48, url: "../monitoring/mon_vo_11_spec1.html" },
            { id: 2, name: "Системы и сети инфокоммуникаций", offset: 33, hasPaid: true, offsetPaid: 49, url: "../monitoring/mon_vo_11_spec2.html" },
            { id: 3, name: "Прикладная информатика", offset: 34, hasPaid: true, offsetPaid: 50, url: "../monitoring/mon_vo_11_spec3.html" },
            { id: 4, name: "Цифровые клиентские сервисы и почтово-логистические системы", offset: 35, hasPaid: true, offsetPaid: 51, url: "../monitoring/mon_vo_11_spec4.html" },
            { id: 5, name: "Маркетинг", offset: 36, hasPaid: true, offsetPaid: 52, url: "../monitoring/mon_vo_11_spec5.html" }
        ];

        // Чтение ячеек
        function getCell(sheet, r, c) {
            if (!sheet) return '';
            const addr = XLSX.utils.encode_cell({ r, c });
            return sheet[addr] ? sheet[addr].v : '';
        }

        // Интервальный парсинг для Высшего Образования (ВО)
        function parseBlockDataVO(sheet, offset) {
            const plan = parseInt(getCell(sheet, offset, 4), 10) || 0;
            const maxScore = 400;

            let applications = [];
            let startCol = 11; // L
            let currentMax = maxScore;

            const h1 = offset >= 40 ? 47 : 31;
            const h2 = offset >= 40 ? 46 : 30;

            for (let col = startCol; col <= 100; col++) {
                let count = parseInt(getCell(sheet, offset, col), 10) || 0;
                let currentMin = currentMax - 4;
                let label = `${currentMax}-${currentMin}`;

                let headerVal = getCell(sheet, h1, col) || getCell(sheet, h2, col);
                if (!headerVal && count === 0 && currentMax < 350) {
                    break;
                }

                if (count > 0) {
                    applications.push({ score: currentMax, minScore: currentMin, label: label, count });
                }
                currentMax -= 5;
                if (currentMax < 0) break;
            }
            return { plan, applications };
        }

        // Подсчет позиции на основе интервалов
        function getPositionVO(applications, userScore) {
            let countAhead = 0;
            applications.forEach(app => {
                if (userScore < app.minScore) {
                    countAhead += app.count;
                } else if (userScore >= app.minScore && userScore <= app.score) {
                    countAhead += app.count;
                }
            });
            return countAhead + 1;
        }

        function Vo11Calculator() {
            const [score, setScore] = useState('');
            const [workbook, setWorkbook] = useState(null);
            const [loading, setLoading] = useState(true);

            // Монтирование: фоновое считывание Excel-базы данных
            useEffect(() => {
                fetch(XLSX_URL)
                    .then(res => {
                        if (!res.ok) throw new Error();
                        return res.arrayBuffer();
                    })
                    .then(buffer => {
                        const wb = XLSX.read(buffer, { type: 'array' });
                        setWorkbook(wb);
                        setLoading(false);
                    })
                    .catch(() => {
                        setLoading(false);
                    });
            }, []);

            // Ограничение ввода балла (ВО: целое число, до 400)
            const handleScoreInput = (e) => {
                let val = e.target.value.replace(/[^0-9]/g, '');

                const checkNum = parseInt(val, 10);
                if (!isNaN(checkNum) && checkNum > 400) {
                    val = '400';
                }
                setScore(val);
            };

            const clearSearch = () => {
                setScore('');
            };

            // Вычисляемые реактивные результаты (Derived State)
            let results = [];
            let isValidScore = false;

            if (score && workbook) {
                const userScore = parseInt(score, 10);
                if (!isNaN(userScore) && userScore >= 0 && userScore <= 400) {
                    isValidScore = true;
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    let calculatedSpecs = [];

                    specsConfig.forEach(spec => {
                        const budgetData = parseBlockDataVO(sheet, spec.offset);
                        const budgetPos = getPositionVO(budgetData.applications, userScore);

                        let paidPos = 0;
                        let paidPlan = 0;

                        if (spec.hasPaid) {
                            const paidData = parseBlockDataVO(sheet, spec.offsetPaid);
                            paidPlan = paidData.plan;
                            paidPos = getPositionVO(paidData.applications, userScore);
                        }

                        const budgetRatio = budgetData.plan > 0 ? (budgetPos / budgetData.plan) : Infinity;
                        const paidRatio = paidPlan > 0 ? (paidPos / paidPlan) : Infinity;
                        const bestRatio = Math.min(budgetRatio, paidRatio);

                        calculatedSpecs.push({
                            name: spec.name,
                            url: spec.url,
                            budget: { position: budgetPos, plan: budgetData.plan },
                            paid: { position: paidPos, plan: paidPlan, exists: spec.hasPaid },
                            bestRatio: bestRatio
                        });
                    });

                    calculatedSpecs.sort((a, b) => {
                        const aPassesBudget = a.budget.plan > 0 && a.budget.position <= a.budget.plan;
                        const bPassesBudget = b.budget.plan > 0 && b.budget.position <= b.budget.plan;
                        const aPassesPaid = a.paid.exists && a.paid.plan > 0 && a.paid.position <= a.paid.plan;
                        const bPassesPaid = b.paid.exists && b.paid.plan > 0 && b.paid.position <= b.paid.plan;

                        let aPriority = 3;
                        if (aPassesBudget) aPriority = 1;
                        else if (aPassesPaid) aPriority = 2;

                        let bPriority = 3;
                        if (bPassesBudget) bPriority = 1;
                        else if (bPassesPaid) bPriority = 2;

                        if (aPriority !== bPriority) return aPriority - bPriority;
                        return a.bestRatio - b.bestRatio;
                    });

                    results = calculatedSpecs;
                }
            }

            const getColorClass = (position, plan) => {
                if (position <= plan) {
                    if (position >= plan * 0.9) return 'text-yellow';
                    return 'text-green';
                }
                return 'text-red';
            };

            return (
                <div>
                    <div className="search-container">
                        <input
                            type="text"
                            className="score-search-input"
                            placeholder={loading ? "Загрузка данных..." : "Введите ваш балл (0-400)"}
                            value={score}
                            onChange={handleScoreInput}
                            disabled={loading}
                        />
                        {score && (
                            <span className="search-clear" style={{ display: 'block' }} onClick={clearSearch}>&times;</span>
                        )}
                    </div>

                    {score && (
                        <div className="search-results-box" style={{ display: 'block' }}>
                            {!isValidScore ? (
                                <div style={{ padding: '15px', textAlign: 'center', color: '#888' }}>
                                    Введите корректный балл от 0 до 400
                                </div>
                            ) : (
                                results.map((spec, idx) => {
                                    const bClass = getColorClass(spec.budget.position, spec.budget.plan);
                                    let paidHtml = null;

                                    if (spec.paid.exists) {
                                        if (spec.paid.plan > 0) {
                                            const pClass = getColorClass(spec.paid.position, spec.paid.plan);
                                            paidHtml = (
                                                <div className="search-paid-line">
                                                    ваша позиция на платное: <span className={pClass}>{spec.paid.position} из {spec.paid.plan}</span>
                                                </div>
                                            );
                                        } else {
                                            paidHtml = <div className="search-paid-line">ваша позиция на платное: нет мест / план не задан</div>;
                                        }
                                    } else {
                                        paidHtml = <div className="search-paid-line">ваша позиция на платное: прием не осуществляется</div>;
                                    }

                                    return (
                                        <a key={idx} href={spec.url} className="search-result-item">
                                            <div className="search-result-name">{spec.name}</div>
                                            <div className="search-result-info">
                                                <div className="search-budget-line">
                                                    ваша позиция на бюджет: <span className={bClass}>{spec.budget.position} из {spec.budget.plan}</span>
                                                </div>
                                                {paidHtml}
                                            </div>
                                        </a>
                                    );
                                })
                            )}
                        </div>
                    )}

                    {!score && (
                        <div className="btn-grid">
                            <a href="../monitoring/mon_vo_11_spec1.html" className="btn-item">Автоматизация технологических процессов и производств<br/><span className="spec-duration">(4 года)</span></a>
                            <a href="../monitoring/mon_vo_11_spec2.html" className="btn-item">Системы и сети инфокоммуникаций<br/><span className="spec-duration">(4 года)</span></a>
                            <a href="../monitoring/mon_vo_11_spec3.html" className="btn-item">Прикладная информатика<br/><span className="spec-duration">(4 года)</span></a>
                            <a href="../monitoring/mon_vo_11_spec4.html" className="btn-item">Цифровые клиентские сервисы и почтово-логистические системы<br/><span class="spec-duration">(4 года)</span></a>
                            <a href="../monitoring/mon_vo_11_spec5.html" className="btn-item">Маркетинг<br/><span class="spec-duration">(4 года)</span></a>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-calculator-root'));
        root.render(<Vo11Calculator />);
    </script>

    <!-- Скрипт плавных переходов страниц (Vanilla JS) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('javascript:') && link.hostname === window.location.hostname) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const targetUrl = link.href;
                        const container = document.querySelector('.container');
                        if (container) {
                            container.style.transition = 'opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1), transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
                            container.style.opacity = '0';
                            container.style.transform = 'translateY(-6px)';
                        }
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 220);
                    });
                }
            });
        });

        const moonSvg = `<path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />`;
        const sunSvg = `<circle cx="12" cy="12" r="5" /><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-width="2" stroke-linecap="round" stroke="currentColor" />`;

        function updateThemeIcon(isDark) {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.innerHTML = isDark ? sunSvg : moonSvg;
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const isDark = document.documentElement.classList.contains('dark-mode');
            updateThemeIcon(isDark);
        });
    </script>
</body>
</html>
