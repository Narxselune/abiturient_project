<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информация по специальностям ВО</title>
    <link rel="stylesheet" href="../../css/main.css">

    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

            ::-webkit-scrollbar-thumb:hover {
                background: rgba(0, 0, 0, 0.35);
            }

        .dark-mode ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
        }

            .dark-mode ::-webkit-scrollbar-thumb:hover {
                background: rgba(255, 255, 255, 0.35);
            }

        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.2) transparent;
        }

        .dark-mode * {
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        .btn-home svg, .btn-theme svg {
            fill: currentColor !important;
        }
    </style>
</head>
<body>
    <a href="../../index.html" class="btn-home" title="На главную">
        <svg viewBox="0 0 24 24">
            <rect x="16" y="4" width="3" height="5" />
            <path d="M12 2.5L2 10.5h2v10a1 1 0 0 0 1 1h6v-6h2v6h6a1 1 0 0 0 1-1v-10h2L12 2.5z" />
        </svg>
    </a>
    <a href="javascript:void(0)" class="btn-theme" onclick="toggleTheme()" title="Переключить тему">
        <svg id="theme-icon" viewBox="0 0 24 24">
            <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />
        </svg>
    </a>

    <div class="container">
        <header>
            <a href="vo_main.html" class="btn-back">← Назад</a>
            <h1>Информация по<br>специальностям ВО</h1>
        </header>

        <main>
            <div class="slider-container">
                <div class="slider-controls">
                    <label for="level-select-vo">Выберите базу: </label>
                    <select id="level-select-vo" class="select-level" onchange="changeBaseVo()">
                        <option value="11">База 11 классов</option>
                        <option value="sso">База ССО (Сокращенная)</option>
                    </select>
                </div>

                <div class="slider-book">
                    <h3 id="vo-spec-title">Загрузка...</h3>
                    <p id="vo-spec-text" style="margin-top: 15px; color: #555; line-height: 1.6;"></p>
                </div>

                <div class="slider-nav-btns">
                    <button class="btn-arrow" onclick="prevPageVo()">← Пред.</button>
                    <span id="vo-page-num" style="font-weight: bold; margin: 0 10px;">1 / 5</span>
                    <button class="btn-arrow" onclick="nextPageVo()">След. →</button>
                </div>
            </div>
        </main>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" class="lightbox-content" src="" alt="Просмотр">
    </div>

    <script>
        const voData11 = [
            { img: "../../VO_11/photo_1.jpeg" },
            { img: "../../VO_11/photo_2.jpeg" },
            { img: "../../VO_11/photo_3.jpeg" },
            { img: "../../VO_11/photo_4.jpeg" },
            { img: "../../VO_11/photo_5.jpeg" }
        ];

        const voDataSso = [
            { img: "../../VO_SSO/photo_1.jpeg" },
            { img: "../../VO_SSO/photo_2.jpeg" },
            { img: "../../VO_SSO/photo_3.jpeg" },
            { img: "../../VO_SSO/photo_4.jpeg" },
            { img: "../../VO_SSO/photo_5.jpeg" }
        ];

        let currentVoData = voData11;
        let currentVoIndex = 0;

        function updateVoSlider() {
            const item = currentVoData[currentVoIndex];
            const sliderBook = document.querySelector(".slider-book");

            if (item.img) {
                sliderBook.style.padding = "10px";
                sliderBook.style.display = "flex";
                sliderBook.style.alignItems = "center";
                sliderBook.style.justifyContent = "center";
                sliderBook.style.minHeight = "340px";
                sliderBook.innerHTML = `<img class="slider-book-img" src="${item.img}" alt="Специальность" onclick="openLightbox(this.src)">`;
            } else {
                sliderBook.style.padding = "40px 20px";
                sliderBook.style.display = "block";
                sliderBook.style.minHeight = "250px";
                sliderBook.innerHTML = `
                                    <h3 id="vo-spec-title" style="margin-bottom: 15px;">${item.title}</h3>
                                    <p id="vo-spec-text" style="color: #555; line-height: 1.6;">${item.text}</p>
                                `;
            }
            document.getElementById("vo-page-num").innerText = `${currentVoIndex + 1} / ${currentVoData.length}`;
        }

        function changeBaseVo() {
            const select = document.getElementById("level-select-vo");
            if (select.value === "11") {
                currentVoData = voData11;
            } else {
                currentVoData = voDataSso;
            }
            currentVoIndex = 0;
            updateVoSlider();
        }

        function nextPageVo() {
            if (currentVoIndex < currentVoData.length - 1) {
                currentVoIndex++;
            } else {
                currentVoIndex = 0;
            }
            updateVoSlider();
        }

        function prevPageVo() {
            if (currentVoIndex > 0) {
                currentVoIndex--;
            } else {
                currentVoIndex = currentVoData.length - 1;
            }
            updateVoSlider();
        }

        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = src;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
        }

        document.addEventListener('keydown', (e) => {
            const activeEl = document.activeElement;
            if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA' || activeEl.tagName === 'SELECT')) {
                return;
            }

            if (e.key === 'ArrowLeft') {
                prevPageVo();
                const lightbox = document.getElementById('lightbox');
                if (lightbox && lightbox.classList.contains('active')) {
                    const activeImg = currentVoData[currentVoIndex].img;
                    if (activeImg) {
                        document.getElementById('lightbox-img').src = activeImg;
                    }
                }
            } else if (e.key === 'ArrowRight') {
                nextPageVo();
                const lightbox = document.getElementById('lightbox');
                if (lightbox && lightbox.classList.contains('active')) {
                    const activeImg = currentVoData[currentVoIndex].img;
                    if (activeImg) {
                        document.getElementById('lightbox-img').src = activeImg;
                    }
                }
            } else if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        window.onload = updateVoSlider;

        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('javascript:') && link.hostname === window.location.hostname) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const targetUrl = link.href;
                        const container = document.querySelector('.container');
                        if (container) {
                            container.style.transition = 'opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1), transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
                            container.style.opacity = '0';
                            container.style.transform = 'translateY(-6px)';
                        }
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 220);
                    });
                }
            });
        });
    </script>
    <script>
        const moonSvg = `<path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />`;
        const sunSvg = `<circle cx="12" cy="12" r="5" /><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-width="2" stroke-linecap="round" stroke="currentColor" />`;

        function updateThemeIcon(isDark) {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.innerHTML = isDark ? sunSvg : moonSvg;
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const isDark = document.documentElement.classList.contains('dark-mode');
            updateThemeIcon(isDark);
        });
    </script>
</body>
</html>
