<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- БАЗОВАЯ ОПТИМИЗАЦИЯ ВЕБ-СТРАНИЦ (PERFORMANCE, SEO): Ранняя инициализация темы для исключения вспышки белого фона -->
    <script>
        try {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        } catch (e) {
            console.warn("Доступ к localStorage заблокирован:", e);
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информация по специальностям ВО</title>
    <link rel="stylesheet" href="../../css/main.css">

    <!-- БАЗОВАЯ ОПТИМИЗАЦИЯ ВЕБ-СТРАНИЦ (PERFORMANCE, SEO): Оптимизация CDN ресурсов -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
</head>
<body>
    <a href="../../index.html" class="btn-home" title="На главную">
        <svg viewBox="0 0 24 24">
            <rect x="16" y="4" width="3" height="5" />
            <path d="M12 2.5L2 10.5h2v10a1 1 0 0 0 1 1h6v-6h2v6h6a1 1 0 0 0 1-1v-10h2L12 2.5z" />
        </svg>
    </a>
    <a href="javascript:void(0)" class="btn-theme" onclick="toggleTheme()" title="Переключить тему">
        <svg id="theme-icon" viewBox="0 0 24 24">
            <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />
        </svg>
    </a>

    <div class="container">
        <header>
            <a href="vo_main.html" class="btn-back">← Назад</a>
            <h1>Информация по<br>специальностям ВО</h1>
        </header>

        <!-- Контейнер монтирования React-приложения -->
        <main id="react-vo-slider-root">
            <div class="academy-loader-container">
                <div class="cap-wrapper">
                    <svg class="mortarboard-svg" viewBox="0 0 64 64">
                        <path d="M16 32 V38 C16 43 23 46 32 46 C41 46 48 43 48 38 V32" fill="none" stroke="#007bff" stroke-width="3" stroke-linecap="round" />
                        <polygon points="32,10 58,22 32,34 6,22" fill="#007bff" stroke="#007bff" stroke-width="1" />
                        <path class="cap-tassel" d="M32,22 L46,27 V37" fill="none" stroke="#ff9800" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                        <circle cx="32" cy="22" r="2" fill="#ffffff" />
                    </svg>
                </div>
                <div class="loader-text">Загрузка данных...</div>
            </div>
        </main>
    </div>

    <!-- ИСПОЛЬЗОВАНИЕ ФРЕЙМВОРКА REACT: Инициализация интерактивного слайдера-галереи специальностей -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const voData11 = [
            { img: "../../VO_11/photo_1.jpeg" },
            { img: "../../VO_11/photo_2.jpeg" },
            { img: "../../VO_11/photo_3.jpeg" },
            { img: "../../VO_11/photo_4.jpeg" },
            { img: "../../VO_11/photo_5.jpeg" }
        ];

        const voDataSso = [
            { img: "../../VO_SSO/photo_1.jpeg" },
            { img: "../../VO_SSO/photo_2.jpeg" },
            { img: "../../VO_SSO/photo_3.jpeg" },
            { img: "../../VO_SSO/photo_4.jpeg" },
            { img: "../../VO_SSO/photo_5.jpeg" }
        ];

        function VoInfoSlider() {
            const [base, setBase] = useState('11');
            const [slides, setSlides] = useState(voData11);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [lightboxImg, setLightboxImg] = useState(null);

            // Обработка переключения базы
            const handleBaseChange = (e) => {
                const value = e.target.value;
                setBase(value);
                setCurrentIndex(0);
                if (value === '11') setSlides(voData11);
                else setSlides(voDataSso);
            };

            const nextSlide = () => {
                setCurrentIndex(prev => (prev < slides.length - 1 ? prev + 1 : 0));
            };

            const prevSlide = () => {
                setCurrentIndex(prev => (prev > 0 ? prev - 1 : slides.length - 1));
            };

            /* ДОБАВЛЕНИЕ ИНТЕРАКТИВНОСТИ ПРИ ПОМОЩИ BOM/DOM: Перехват нажатия стрелок клавиатуры и Esc для перелистывания и закрытия слайдера */
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowLeft') {
                        prevSlide();
                    } else if (e.key === 'ArrowRight') {
                        nextSlide();
                    } else if (e.key === 'Escape') {
                        setLightboxImg(null);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                };
            }, [slides, currentIndex]);

            // Обновление лайтбокса при прокрутке стрелками
            useEffect(() => {
                if (lightboxImg) {
                    setLightboxImg(slides[currentIndex].img);
                }
            }, [currentIndex]);

            /* ДОБАВЛЕНИЕ ИНТЕРАКТИВНЫХ КОМПОНЕНТОВ (СЛАЙДЕРЫ, ФОРМЫ, ФИЛЬТРЫ) С ОБРАБОТКОЙ ДАННЫХ ПОЛЬЗОВАТЕЛЯ: Слайдер смены изображений и модальное окно полноэкранного просмотра */
            return (
                <div className="slider-container">
                    {/* Селектор баз */}
                    <div className="slider-controls">
                        <label htmlFor="level-select-vo">Выберите базу: </label>
                        <select id="level-select-vo" className="select-level" value={base} onChange={handleBaseChange}>
                            <option value="11">База 11 классов</option>
                            <option value="sso">База ССО (Сокращенная)</option>
                        </select>
                    </div>

                    {/* Окно книги со слайдом */}
                    <div className="slider-book" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '340px', padding: '10px' }}>
                        <img
                            className="slider-book-img"
                            src={slides[currentIndex].img}
                            alt="Специальность"
                            onClick={() => setLightboxImg(slides[currentIndex].img)}
                        />
                    </div>

                    {/* Навигация */}
                    <div className="slider-nav-btns">
                        <button className="btn-arrow" onClick={prevSlide}>← Пред.</button>
                        <span style={{ fontWeight: 'bold', margin: '0 10px' }}>{currentIndex + 1} / {slides.length}</span>
                        <button className="btn-arrow" onClick={nextSlide}>След. →</button>
                    </div>

                    {/* Лайтбокс */}
                    {lightboxImg && (
                        <div className="lightbox active" onClick={() => setLightboxImg(null)}>
                            <span className="lightbox-close" onClick={() => setLightboxImg(null)}>&times;</span>
                            <img className="lightbox-content" src={lightboxImg} alt="Просмотр" onClick={(e) => e.stopPropagation()} />
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-vo-slider-root'));
        root.render(<VoInfoSlider />);
    </script>

    <!-- ДОБАВЛЕНИЕ ИНТЕРАКТИВНОСТИ ПРИ ПОМОЩИ BOM/DOM: Межстраничные переходы и переключение тем оформления -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('javascript:') && link.hostname === window.location.hostname) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const targetUrl = link.href;
                        const container = document.querySelector('.container');
                        if (container) {
                            container.style.transition = 'opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1), transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
                            container.style.opacity = '0';
                            container.style.transform = 'translateY(-6px)';
                        }
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 220);
                    });
                }
            });
        });

        const moonSvg = `<path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-9 8.3-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-3.5 2.5-4.2 7.4-1.7 10.9 2.5 3.5 7.4 4.2 10.9 1.7.4-.3 1-.3 1.4.1.4.4.5.9.2 1.4-1.8 2.3-4.5 3.6-7.8 3.6z" />`;
        const sunSvg = `<circle cx="12" cy="12" r="5" /><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-width="2" stroke-linecap="round" stroke="currentColor" />`;

        function updateThemeIcon(isDark) {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.innerHTML = isDark ? sunSvg : moonSvg;
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const isDark = document.documentElement.classList.contains('dark-mode');
            updateThemeIcon(isDark);
        });
    </script>
</body>
</html>
