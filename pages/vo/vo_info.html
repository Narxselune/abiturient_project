<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информация по специальностям ВО</title>
    <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="vo_main.html" class="btn-back">← Назад</a>
            <h1>Информация по специальностям ВО</h1>
        </header>

        <main>
            <div class="slider-container">
                <div class="slider-controls">
                    <label for="level-select-vo">Выберите базу: </label>
                    <select id="level-select-vo" class="select-level" onchange="changeBaseVo()">
                        <option value="11">База 11 классов</option>
                        <option value="sso">База ССО (Сокращенная)</option>
                    </select>
                </div>

                <div class="slider-book">
                    <h3 id="vo-spec-title">Загрузка...</h3>
                    <p id="vo-spec-text" style="margin-top: 15px; color: #555; line-height: 1.6;"></p>
                </div>

                <div class="slider-nav-btns">
                    <button class="btn-arrow" onclick="prevPageVo()">← Пред.</button>
                    <span id="vo-page-num" style="font-weight: bold; margin: 0 10px;">1 / 5</span>
                    <button class="btn-arrow" onclick="nextPageVo()">След. →</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Данные для Базы 11 классов (строго 5 специальностей)
        const voData11 = [
            { title: "Специальность 1 (ВО, 11 кл.)", text: "" },
            { title: "Специальность 2 (ВО, 11 кл.)", text: "" },
            { title: "Специальность 3 (ВО, 11 кл.)", text: "" },
            { title: "Специальность 4 (ВО, 11 кл.)", text: "" },
            { title: "Специальность 5 (ВО, 11 кл.)", text: "" }
        ];

        // Данные для базы ССО (строго 3 специальности)
        const voDataSso = [
            { title: "Специальность 1 (ВО на базе ССО)", text: "" },
            { title: "Специальность 2 (ВО на базе ССО)", text: "" },
            { title: "Специальность 3 (ВО на базе ССО)", text: "" }
        ];

        let currentVoData = voData11;
        let currentVoIndex = 0;

        function updateVoSlider() {
            const item = currentVoData[currentVoIndex];
            document.getElementById("vo-spec-title").innerText = item.title;
            document.getElementById("vo-spec-text").innerText = item.text;
            document.getElementById("vo-page-num").innerText = `${currentVoIndex + 1} / ${currentVoData.length}`;
        }

        function changeBaseVo() {
            const select = document.getElementById("level-select-vo");
            if (select.value === "11") {
                currentVoData = voData11;
            } else {
                currentVoData = voDataSso;
            }
            currentVoIndex = 0; // Сбрасываем на первую страницу при смене базы
            updateVoSlider();
        }

        function nextPageVo() {
            if (currentVoIndex < currentVoData.length - 1) {
                currentVoIndex++;
            } else {
                currentVoIndex = 0; // закольцовываем
            }
            updateVoSlider();
        }

        function prevPageVo() {
            if (currentVoIndex > 0) {
                currentVoIndex--;
            } else {
                currentVoIndex = currentVoData.length - 1; // закольцовываем в обратную сторону
            }
            updateVoSlider();
        }

        // Первичная инициализация при открытии страницы
        window.onload = updateVoSlider;
    </script>
</body>
</html>
