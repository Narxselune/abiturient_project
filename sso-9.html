<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Специальности ССО — 9 классов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light-purple min-vh-100 d-flex align-items-center justify-content-center">
    <main class="container py-4" style="max-width: 500px;">
        <div class="card shadow border-0 p-4 rounded-4">
            <div class="text-start mb-3">
                <a href="sso.html" class="btn btn-outline-secondary btn-sm rounded-pill px-3">← назад</a>
            </div>
            <h3 class="h4 fw-bold text-center text-primary text-decoration-underline mb-1">Абитуриентам после 9 класса</h3>
            <p class="text-muted text-center small mb-4">среднее специальное образование</p>

            <div class="mb-4">
                <input type="number" step="0.1" id="score-input" class="form-control text-center py-2" placeholder="Введите средний балл">
            </div>

            <div class="d-flex flex-column gap-2 overflow-auto pe-1" style="max-height: 400px;">
                <button class="btn btn-blue-custom py-3 text-start px-3 rounded-3">
                    <div class="fw-bold text-dark text-center">Тестирование программного обеспечения</div>
                    <div class="text-muted text-center small">(3 года)</div>
                </button>
                <button class="btn btn-blue-custom py-3 text-start px-3 rounded-3">
                    <div class="fw-bold text-dark text-center">Разработка и сопровождение веб-ресурсов</div>
                    <div class="text-muted text-center small">(3 года 10 месяцев)</div>
                </button>
                <button class="btn btn-blue-custom py-3 text-start px-3 rounded-3">
                    <div class="fw-bold text-dark text-center">Техническая эксплуатация систем и сетей телекоммуникаций</div>
                    <div class="text-muted text-center small">(3 года 10 месяцев)</div>
                </button>
                <button class="btn btn-blue-custom py-3 text-start px-3 rounded-3">
                    <div class="fw-bold text-dark text-center">Информационные кабельные сети</div>
                    <div class="text-muted text-center small">(3 года 10 месяцев)</div>
                </button>
            </div>
        </div>
    </main>
</body>
</html>
